<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>USW v1.4.1</title>
<style>
body{margin:0;background:#000}
canvas{display:block}
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth*0.8;
canvas.height=window.innerHeight;

const SEA=2;

function nmX(x){return x/SEA*canvas.width;}
function nmY(y){return y/SEA*canvas.height;}
function pxToNmX(x){return x/canvas.width*SEA;}
function pxToNmY(y){return y/canvas.height*SEA;}

let selected=null;

// ======================
// HS
// ======================
const HS=[
{x:1,y:0.2,tx:1,ty:0.2,mission:"AUTO"},
{x:0.2,y:1.8,tx:0.2,ty:1.8,mission:"AUTO"},
{x:1.8,y:1.8,tx:1.8,ty:1.8,mission:"AUTO"}
];

// ======================
// CONTACTS
// ======================
const contacts=[];
function rand(min,max){return min+Math.random()*(max-min);}

// 水塊
for(let i=0;i<3+Math.floor(Math.random()*3);i++){
contacts.push({type:"THERMAL",x:rand(0,2),y:rand(0,2)});
}
// 鯨
if(Math.random()<0.5){
contacts.push({type:"WHALE",x:rand(0,2),y:rand(0,2),vx:rand(-0.002,0.002),vy:rand(-0.002,0.002)});
}
// 沈船
for(let i=0;i<Math.floor(Math.random()*4);i++){
contacts.push({type:"WRECK",x:rand(0,2),y:rand(0,2)});
}
// 潜水艦
const sub={type:"SUB",x:1.5,y:1.2};

// ======================
// TAP（修正版）
// ======================
canvas.addEventListener("pointerdown",e=>{
const rect=canvas.getBoundingClientRect();
const px=e.clientX-rect.left;
const py=e.clientY-rect.top;

// 最近傍HS探索
let nearest=null;
let min=Infinity;

HS.forEach(h=>{
const d=Math.hypot(nmX(h.x)-px,nmY(h.y)-py);
if(d<min){min=d;nearest=h;}
});

// ★重要：半径を小さく＆優先分岐
const SELECT_RADIUS=28;

if(nearest && min<SELECT_RADIUS){
selected=nearest;
return;
}

// ===== 海面タップ処理 =====
if(!selected)return;

const tx=pxToNmX(px);
const ty=pxToNmY(py);

selected.tx=tx;
selected.ty=ty;

});

// ======================
// UPDATE
// ======================
function update(){

// 鯨移動
contacts.forEach(c=>{
if(c.type==="WHALE"){
c.x+=c.vx;
c.y+=c.vy;
}
});

// HS移動
HS.forEach(h=>{
h.x+=(h.tx-h.x)*0.02;
h.y+=(h.ty-h.y)*0.02;
});

}

// ======================
// DRAW
// ======================
function draw(){

// 海
ctx.fillStyle="#083b55";
ctx.fillRect(0,0,canvas.width,canvas.height);

// 波
for(let i=0;i<200;i++){
ctx.strokeStyle="rgba(255,255,255,0.5)";
ctx.beginPath();
ctx.arc(Math.random()*canvas.width,Math.random()*canvas.height,3,0,Math.PI);
ctx.stroke();
}

// HS
HS.forEach(h=>{
let x=nmX(h.x);
let y=nmY(h.y);

ctx.fillStyle="#ccc";
ctx.beginPath();
ctx.arc(x,y,10,0,Math.PI*2);
ctx.fill();

if(h===selected){
ctx.strokeStyle="cyan";
ctx.beginPath();
ctx.arc(x,y,18,0,Math.PI*2);
ctx.stroke();
}
});

// 潜水艦（テスト用）
ctx.fillStyle="white";
ctx.fillRect(nmX(sub.x),nmY(sub.y),2,2);

requestAnimationFrame(loop);
}

// ======================
function loop(){
update();
draw();
}
loop();

</script>
</body>
</html>
