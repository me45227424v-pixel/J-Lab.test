<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>JLab USW Simulator v1.4.7 Complete</title>
<style>
  :root{
    --panel-bg:#050505;
    --panel-border:#1f1f1f;
    --text:#b7ffb7;
    --amber:#ffcf66;
    --cyan:#77e7ff;
    --danger:#ff6b6b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{
    margin:0;width:100%;height:100%;overflow:hidden;background:#000;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  #app{display:flex;width:100vw;height:100vh}
  #seaWrap{
    position:relative;
    width:80vw;
    height:100vh;
    overflow:hidden;
    background:#082635;
  }
  #game{
    display:block;
    width:100%;
    height:100%;
    touch-action:none;
    cursor:crosshair;
  }
  #panel{
    width:20vw;
    min-width:280px;
    height:100vh;
    background:var(--panel-bg);
    color:var(--text);
    border-left:2px solid var(--panel-border);
    padding:10px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    gap:0;
  }
  .title{
    font-weight:700;
    letter-spacing:.08em;
    margin:2px 0 8px;
    color:#e8ffe8;
    font-size:22px;
    flex:0 0 auto;
  }
  .section{
    border:1px solid #173117;
    padding:8px;
    margin-bottom:10px;
    background:rgba(0,30,0,.16);
    flex:0 0 auto;
  }
  .section h3{
    margin:0 0 6px;
    font-size:16px;
    color:var(--amber);
    letter-spacing:.06em;
  }
  .kv{
    display:flex;
    justify-content:space-between;
    gap:8px;
    font-size:14px;
    line-height:1.35;
  }
  .small{
    font-size:13px;
    opacity:.95;
    line-height:1.32;
  }
  .hsCard{
    border:1px solid #234423;
    padding:7px;
    margin:6px 0;
    background:rgba(0,20,0,.22);
    cursor:pointer;
  }
  .hsCard.selected{
    outline:2px solid var(--cyan);
  }
  .btnRow{
    display:grid;
    grid-template-columns:1fr;
    gap:7px;
    margin-top:8px;
  }
  button{
    width:100%;
    border:1px solid #355335;
    background:#0c160c;
    color:var(--text);
    padding:9px 10px;
    border-radius:8px;
    font-size:16px;
  }
  button.primary{
    border-color:#337c8c;
    color:#d6faff;
    background:#0d1b20;
  }
  button.attack{
    border-color:#8c5f33;
    color:#fff3d6;
    background:#20170d;
  }
  button:disabled{
    opacity:.42;
  }
  button:active{
    transform:scale(.99);
  }
  button.activeMission{
    border-color:#3cff72;
    color:#eaffea;
    background:rgba(20,120,40,0.35);
    box-shadow:
      0 0 0 1px rgba(60,255,114,0.25) inset,
      0 0 10px rgba(60,255,114,0.22);
  }
  #logSection{
    margin-top:auto;
    margin-bottom:0;
  }
  .log{
    font-size:11px;
    line-height:1.2;
    min-height:14px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
</style>
</head>
<body>
<div id="app">
  <div id="seaWrap">
    <canvas id="game"></canvas>
  </div>

  <aside id="panel">
    <div class="title">USW // HS-3</div>

    <div class="section">
      <h3>SELECTED AIRCRAFT</h3>
      <div id="selectedInfo" class="small">HSをクリックまたはタップして選択。未選択時は全機AUTO飛行。</div>
      <div class="btnRow">
        <button id="missionSnrBtn" class="primary">SNR</button>
        <button id="missionSonoBtn" class="primary">SONO</button>
        <button id="missionMadBtn" class="primary">MAD</button>
      </div>
    </div>

    <div class="section">
      <h3>HS STATUS</h3>
      <div id="hsList"></div>
    </div>

    <div class="section">
      <h3>CONTACT CONDITION</h3>
      <div id="contactConditionInfo" class="small">NO CONTACT</div>
      <div class="btnRow">
        <button id="attackBtn" class="attack" disabled>ATTACK</button>
      </div>
    </div>

    <div id="logSection" class="section">
      <h3>ALERT / LOG</h3>
      <div id="log" class="log"></div>
    </div>
  </aside>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const seaWrap = document.getElementById('seaWrap');
  const ctx = canvas.getContext('2d');
  canvas.style.touchAction = 'none';

  const selectedInfoEl = document.getElementById('selectedInfo');
  const hsListEl = document.getElementById('hsList');
  const logEl = document.getElementById('log');
  const contactConditionInfoEl = document.getElementById('contactConditionInfo');

  const missionSnrBtn = document.getElementById('missionSnrBtn');
  const missionSonoBtn = document.getElementById('missionSonoBtn');
  const missionMadBtn = document.getElementById('missionMadBtn');
  const attackBtn = document.getElementById('attackBtn');

  const SEA_NM = 2.0;
  const WIND_FROM_DEG = (Math.floor(Math.random() * 72) + 1) * 5;
  const WIND_SPEED_KT = 15;
  const HS_SIZE_RATIO = 1 / 20;

  const HS_MAX_SPEED = 0.035;
  const FUEL_START_LBS = 3800;
  const FUEL_BINGO_LBS = 1000;
  const FUEL_BURN_PER_SEC = ((3800 - 1000) / 300) / 3;

  const SAFE_MARGIN_NM = SEA_NM * 0.10;

  const TRACK_EXPIRE_SEC = 6.0;
  const TORPEDO_SPEED_NMPS = 0.022;
  const TORPEDO_SEEK_RANGE_NM = 0.090;
  const TORPEDO_HIT_RANGE_NM = 0.018;

  const state = {
    width: 1,
    height: 1,
    logs: [],
    selected: null,
    simTime: 0,
    lastFrame: 0,
    buoys: [],
    madContacts: [],
    contact: null,
    lastContactTime: null,
    lastContactSensor: null,
    lastContactRadius: null,
    lastDetectionTime: 0,
    whitecapSeedCount: 0,
    plannedPoint: null,

    tracks: [],
    trackSeq: 0,
    trackCycleTimer: 0,
    trackDisplayIndex: 0,

    torpedo: null,
    explosions: []
  };

  const submarine = {
    type: 'SUB',
    x: 1.38,
    y: 0.84,
    heading: 2.2,
    targetHeading: 2.2,
    speed: 0.0,
    targetSpeed: 0.0,
    maxSpeed: (HS_MAX_SPEED / 6) * 0.7,
    accelPerSec: ((HS_MAX_SPEED / 6) * 0.7) / 30,
    straightTimer: 12 + Math.random() * 18,
    turning: false,
    turnRemainingDeg: 0,
    periscopeUp: false,
    periscopeTimer: 0,
    periscopeCooldown: 0,
    destroyed: false
  };

  function makeHS(id, x, y) {
    return {
      id,
      x, y, tx:x, ty:y,
      heading: 0,
      altitude: 1000,
      desiredAltitude: 1000,
      mission: 'RADAR',
      phase: 'AI',
      speed: HS_MAX_SPEED,
      rotorPhase: Math.random() * Math.PI * 2,
      flashTimer: 0,

      fuel: FUEL_START_LBS,
      fuelState: 'NORMAL',
      respawnTimer: 0,
      respawnX: x,
      respawnY: y,
      exitX: null,
      exitY: null,

      snrState: 'NONE',
      snrWaitTimer: 0,
      snrPulseTimer: 0,
      snrPulseAge: 99,
      snrContact: null,
      gateX: null,
      gateY: null,
      finalX: null,
      finalY: null,
      snrApproachHeading: 0,
      snrNextTask: null,

      madTrack: false,
      madAngle: 0,
      madCenterX: 0,
      madCenterY: 0,
      madTrackTimer: 0,
      madDetectCooldown: 0,
      madOrbitRadius: 0.10,

      madDeploy: 0,
      madDeployTarget: 0
    };
  }

  const helicopters = [
    makeHS(0, 1.00, 0.30),
    makeHS(1, 0.30, 1.50),
    makeHS(2, 1.70, 1.50)
  ];

  function makeFalseTargets(){
    const targets = [];

    const thermalCount = 3 + Math.floor(Math.random() * 3);
    for(let i=0;i<thermalCount;i++){
      targets.push({
        type:'THERMAL',
        x: 0.12 + Math.random() * 1.76,
        y: 0.12 + Math.random() * 1.76,
        heading: 0,
        speed: 0,
        destroyed:false
      });
    }

    if(Math.random() < 0.5){
      targets.push({
        type:'WHALE',
        x: 0.12 + Math.random() * 1.76,
        y: 0.12 + Math.random() * 1.76,
        heading: Math.random() * Math.PI * 2,
        targetHeading: Math.random() * Math.PI * 2,
        speed: submarine.maxSpeed * (0.4 + Math.random() * 0.35),
        turnTimer: 8 + Math.random() * 12,
        destroyed:false
      });
    }

    const wreckCount = Math.floor(Math.random() * 4);
    for(let i=0;i<wreckCount;i++){
      targets.push({
        type:'WRECK',
        x: 0.12 + Math.random() * 1.76,
        y: 0.12 + Math.random() * 1.76,
        heading: 0,
        speed: 0,
        destroyed:false
      });
    }

    return targets;
  }

  const falseTargets = makeFalseTargets();

  function getAllContacts(){
    const contacts = [];
    if(!submarine.destroyed) contacts.push(submarine);
    for(const c of falseTargets){
      if(!c.destroyed) contacts.push(c);
    }
    return contacts;
  }

  function degToRad(deg){ return deg * Math.PI / 180; }
  function radToDeg(rad){ return rad * 180 / Math.PI; }
  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
  function wrapHeading(a){
    while(a < -Math.PI) a += Math.PI * 2;
    while(a > Math.PI) a -= Math.PI * 2;
    return a;
  }
  function dist(ax, ay, bx, by){ return Math.hypot(ax - bx, ay - by); }
  function nmX(x){ return x / SEA_NM * state.width; }
  function nmY(y){ return y / SEA_NM * state.height; }

  function compassToCanvasRad(deg){
    return degToRad(90 - deg);
  }

  function canvasRadToCompassDeg(rad){
    let deg = 90 - radToDeg(rad);
    while(deg < 0) deg += 360;
    while(deg >= 360) deg -= 360;
    return Math.round(deg / 5) * 5 % 360;
  }

  function compassVector(deg){
    const r = degToRad(deg);
    return {
      x: Math.sin(r),
      y: -Math.cos(r)
    };
  }

  function fuelDisplay(v){
    return Math.max(0, Math.floor(v / 10) * 10);
  }

  function updateFalseTargets(dt){
    for(const t of falseTargets){
      if(t.destroyed) continue;
      if(t.type !== 'WHALE') continue;

      t.turnTimer -= dt;
      if(t.turnTimer <= 0){
        t.targetHeading = t.heading + degToRad(-35 + Math.random() * 70);
        t.turnTimer = 8 + Math.random() * 12;
      }

      const diff = wrapHeading(t.targetHeading - t.heading);
      t.heading += clamp(diff, -degToRad(12) * dt, degToRad(12) * dt);

      t.x += Math.cos(t.heading) * t.speed * dt;
      t.y += Math.sin(t.heading) * t.speed * dt;

      if(t.x < 0.04 || t.x > SEA_NM - 0.04){
        t.heading = Math.PI - t.heading;
        t.targetHeading = t.heading;
        t.x = clamp(t.x, 0.04, SEA_NM - 0.04);
      }
      if(t.y < 0.04 || t.y > SEA_NM - 0.04){
        t.heading = -t.heading;
        t.targetHeading = t.heading;
        t.y = clamp(t.y, 0.04, SEA_NM - 0.04);
      }
    }
  }

  function findNearestDetectableContact(x, y, rangeNm, sensorType){
    let best = null;
    let bestD = Infinity;

    for(const c of getAllContacts()){
      let detectable = false;
      if(sensorType === 'SNR'){
        detectable = true;
      } else if(sensorType === 'SONO'){
        detectable = c.type === 'SUB';
      } else if(sensorType === 'MAD'){
        detectable = c.type === 'SUB' || c.type === 'WRECK';
      }

      if(!detectable) continue;
      const d = dist(x, y, c.x, c.y);
      if(d <= rangeNm && d < bestD){
        best = c;
        bestD = d;
      }
    }

    return best ? { contact: best, distance: bestD } : null;
  }

  function resize(){
    const rect = seaWrap.getBoundingClientRect();
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    state.width = rect.width;
    state.height = rect.height;
    state.whitecapSeedCount = Math.max(90, Math.floor(state.width * state.height / 11000));
  }

  function nowStamp() {
    const min = Math.floor(state.simTime / 60);
    const sec = Math.floor(state.simTime % 60);
    return `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function addLog(msg){
    state.logs.unshift(`[${nowStamp()}] ${msg}`);
    state.logs = state.logs.slice(0, 45);
    logEl.textContent = state.logs[0] || '';
  }

  function windLineText(deg){
    const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    const idx = Math.round((((deg % 360) + 360) % 360) / 22.5) % 16;
    return `${deg}° / ${dirs[idx]}`;
  }

  function missionAltitudeText(h){
    if(h.mission === 'SNR') return '70 FT';
    if(h.mission === 'MAD') return '400 FT';
    return '1000 FT';
  }

  function setSelected(h){
    if(h.fuelState === 'OFFSCREEN') return;
    state.selected = h;
    updateUI();
  }

  function registerTrack(target, sensor, estX, estY){
    if(!target || target.destroyed) return;

    let track = state.tracks.find(t => t.target === target);
    if(!track){
      track = {
        id: ++state.trackSeq,
        target,
        type: target.type,
        sensor,
        x: estX,
        y: estY,
        lastSeen: state.simTime,
        conditionTimer: 0,
        displayHeadingDeg: canvasRadToCompassDeg(target.heading || 0),
        displaySpeedKt: (target.speed || 0) * 3600
      };
      state.tracks.push(track);
    } else {
      track.sensor = sensor;
      track.x = estX;
      track.y = estY;
      track.lastSeen = state.simTime;
    }
  }

  function getActiveTracks(){
    return state.tracks.filter(t =>
      (state.simTime - t.lastSeen) <= TRACK_EXPIRE_SEC &&
      (!t.target || !t.target.destroyed)
    );
  }

  function getDisplayedTrack(){
    const active = getActiveTracks();
    if(active.length === 0) return null;
    const idx = ((state.trackDisplayIndex % active.length) + active.length) % active.length;
    return active[idx];
  }

  function formatTrackCondition(track){
    const hdg = String(track.displayHeadingDeg).padStart(3,'0');
    const spd = Math.max(0, Math.round(track.displaySpeedKt));
    return `${track.type}  COS ${hdg}° / SPD ${spd}KT`;
  }

  function updateUI(){
    if(!state.selected){
      selectedInfoEl.innerHTML = `
        <div class="small">HSをクリックまたはタップして選択。</div>
        <div class="small">未選択時は全機AUTO飛行。</div>
        <div class="small">WIND LINE: ${windLineText(WIND_FROM_DEG)}</div>
      `;
    } else {
      const h = state.selected;
      const madLine = (h.mission === 'MAD')
        ? `<div class="small">MAD DEPLOY: ${Math.round(h.madDeploy * 100)}%</div>`
        : '';
      selectedInfoEl.innerHTML = `
        <div><strong>HS-${h.id + 1}</strong> / <span style="color:#fff0c2">${h.mission}</span></div>
        <div class="small">WIND LINE: ${windLineText(WIND_FROM_DEG)}</div>
        <div class="small">ALT: ${missionAltitudeText(h)}</div>
        <div class="small">FUEL: ${fuelDisplay(h.fuel)} lbs</div>
        ${madLine}
      `;
    }

    hsListEl.innerHTML = '';
    helicopters.forEach(h => {
      let pilotLabel = (h.phase === 'AI' || h.phase === 'IDLE') ? 'AUTO' : h.phase;
      if(h.phase === 'RTB') pilotLabel = 'RTB';
      if(h.fuelState === 'OFFSCREEN') pilotLabel = 'MOTHER';

      const div = document.createElement('div');
      div.className = `hsCard ${state.selected === h ? 'selected' : ''}`;
      div.innerHTML = `
        <div class="kv"><strong>HS-${h.id + 1}</strong><span>${h.mission}</span></div>
        <div class="kv"><span>PILOT</span><span>${pilotLabel}</span></div>
        <div class="kv"><span>ALT</span><span>${missionAltitudeText(h)}</span></div>
        <div class="kv"><span>FUEL</span><span>${fuelDisplay(h.fuel)} lbs</span></div>
      `;
      div.addEventListener('click', () => setSelected(h));
      hsListEl.appendChild(div);
    });

    missionSnrBtn.classList.remove('activeMission');
    missionSonoBtn.classList.remove('activeMission');
    missionMadBtn.classList.remove('activeMission');

    if(state.selected && state.selected.mission === 'SONO'){
      missionSonoBtn.textContent = 'LAUNCH';
    } else {
      missionSonoBtn.textContent = 'SONO';
    }

    if(state.selected){
      if(state.selected.mission === 'SNR') missionSnrBtn.classList.add('activeMission');
      if(state.selected.mission === 'SONO') missionSonoBtn.classList.add('activeMission');
      if(state.selected.mission === 'MAD') missionMadBtn.classList.add('activeMission');
    }

    const displayedTrack = getDisplayedTrack();
    if(displayedTrack){
      contactConditionInfoEl.textContent = formatTrackCondition(displayedTrack);
    } else {
      contactConditionInfoEl.textContent = 'NO CONTACT';
    }

    const attackAllowed =
      !!state.selected &&
      !!displayedTrack &&
      !state.torpedo &&
      state.selected.fuelState !== 'LOW' &&
      state.selected.fuelState !== 'OFFSCREEN' &&
      (
        (state.selected.mission === 'SNR' && (state.selected.snrState === 'ACTIVE' || state.selected.snrState === 'HOVER_WAIT')) ||
        state.selected.mission === 'SONO' ||
        state.selected.mission === 'MAD'
      );

    attackBtn.disabled = !attackAllowed;
  }

  function setMission(mission){
    if(!state.selected){
      addLog('NO AIRCRAFT SELECTED');
      return;
    }

    const h = state.selected;
    if(h.fuelState === 'LOW' || h.fuelState === 'OFFSCREEN'){
      addLog(`HS-${h.id+1} unavailable (LOW FUEL / RTB)`);
      return;
    }

    const prevMission = h.mission;
    h.mission = mission;

    if(mission === 'SNR'){
      h.desiredAltitude = 150;
      h.phase = 'MANUAL';
      h.snrState = 'NONE';
      h.snrNextTask = null;
      h.madTrack = false;
    } else if(mission === 'SONO'){
      h.desiredAltitude = 1000;
      h.phase = 'MANUAL';
      h.snrState = 'NONE';
      h.snrNextTask = null;
      h.madTrack = false;
    } else if(mission === 'MAD'){
      h.desiredAltitude = 400;
      h.phase = 'MANUAL';
      h.snrState = 'NONE';
      h.snrNextTask = null;
      h.madTrack = false;
    }

    if(mission === 'MAD' && prevMission !== 'MAD'){
      h.madDeployTarget = 1;
      addLog(`HS-${h.id+1} MAD deploying`);
    } else if(mission !== 'MAD' && prevMission === 'MAD'){
      h.madDeployTarget = 0;
      addLog(`HS-${h.id+1} MAD retracting`);
    }

    addLog(`HS-${h.id+1} mission set: ${mission}`);
    updateUI();
  }

  missionSnrBtn.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    setMission('SNR');
  });

  missionSonoBtn.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();

    if(!state.selected){
      addLog('NO AIRCRAFT SELECTED');
      return;
    }

    if(state.selected.mission === 'SONO'){
      launchSono(state.selected);
      return;
    }

    setMission('SONO');
  });

  missionMadBtn.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    setMission('MAD');
  });

  attackBtn.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    launchTorpedo();
  });

  function launchSono(h){
    if(h.fuelState === 'LOW' || h.fuelState === 'OFFSCREEN') return;
    state.buoys.push({
      x: h.x,
      y: h.y,
      rangeNm: 0.22,
      ttl: 2 * 60,
      bearingLine: null,
      bearingTimer: 0,
      lostThreshold: 0.9 + Math.random() * 0.1
    });
    addLog(`HS-${h.id+1} SONO launched`);
  }

  function computeSonarGate(tx, ty){
    const gateOffsetNm = 0.06;
    const opp = (WIND_FROM_DEG + 180) % 360;
    const v = compassVector(opp);
    return {
      x: clamp(tx + v.x * gateOffsetNm, SAFE_MARGIN_NM, SEA_NM - SAFE_MARGIN_NM),
      y: clamp(ty + v.y * gateOffsetNm, SAFE_MARGIN_NM, SEA_NM - SAFE_MARGIN_NM)
    };
  }

  function getMadRangeNm(){ return 0.022; }
  function getSnrRangeNm(){ return 0.11; }

  function pointerToSea(clientX, clientY){
    const rect = canvas.getBoundingClientRect();
    const xPx = clientX - rect.left;
    const yPx = clientY - rect.top;
    if(xPx < 0 || yPx < 0 || xPx > rect.width || yPx > rect.height) return null;
    return { x: xPx / rect.width * SEA_NM, y: yPx / rect.height * SEA_NM };
  }

  canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();

    const rect = canvas.getBoundingClientRect();
    const px = e.clientX - rect.left;
    const py = e.clientY - rect.top;

    const SELECT_RADIUS = 22;

    let nearest = null;
    let minDist = Infinity;

    for(const h of helicopters){
      if(h.fuelState === 'OFFSCREEN') continue;
      const hx = nmX(h.x);
      const hy = nmY(h.y);
      const d = Math.hypot(hx - px, hy - py);
      if(d < minDist){
        minDist = d;
        nearest = h;
      }
    }

    if(nearest && minDist <= SELECT_RADIUS){
      if(nearest === state.selected){
        nearest.flashTimer = 0.18;
      } else {
        setSelected(nearest);
      }
      return;
    }

    const p = pointerToSea(e.clientX, e.clientY);
    if(!p) return;

    if(!state.selected){
      addLog('SELECT AIRCRAFT FIRST');
      return;
    }

    const h = state.selected;
    if(h.fuelState === 'LOW' || h.fuelState === 'OFFSCREEN'){
      addLog(`HS-${h.id+1} cannot accept task while RTB`);
      return;
    }

    state.plannedPoint = { x: p.x, y: p.y, ttl: 9999 };

    if(h.mission === 'SNR'){
      const gate = computeSonarGate(p.x, p.y);
      const approachHeading = Math.atan2(p.y - gate.y, p.x - gate.x);

      if(h.snrState === 'ACTIVE' || h.snrState === 'HOVER_WAIT'){
        h.snrNextTask = {
          finalX: p.x,
          finalY: p.y,
          gateX: gate.x,
          gateY: gate.y,
          approachHeading
        };
        h.snrState = 'EXIT_WAIT';
        h.snrWaitTimer = 5;
        h.phase = 'MANUAL';
        addLog(`HS-${h.id+1} dip ended, next dip queued -> (${p.x.toFixed(2)}, ${p.y.toFixed(2)})`);
        return;
      }

      h.finalX = p.x;
      h.finalY = p.y;
      h.gateX = gate.x;
      h.gateY = gate.y;
      h.tx = gate.x;
      h.ty = gate.y;
      h.snrApproachHeading = approachHeading;
      h.snrNextTask = null;
      h.snrState = 'APPROACH';
      h.phase = 'MANUAL';
      h.desiredAltitude = 150;
      h.madTrack = false;
      addLog(`HS-${h.id+1} SNR approach -> (${p.x.toFixed(2)}, ${p.y.toFixed(2)})`);
      return;
    }

    if(h.mission === 'SONO'){
      h.tx = p.x;
      h.ty = p.y;
      h.phase = 'TRANSIT';
      h.desiredAltitude = 1000;
      addLog(`HS-${h.id+1} SONO transit -> (${p.x.toFixed(2)}, ${p.y.toFixed(2)})`);
      return;
    }

    if(h.mission === 'MAD'){
      h.tx = p.x;
      h.ty = p.y;
      h.phase = 'TRANSIT';
      h.desiredAltitude = 400;
      h.madTrack = false;
      addLog(`HS-${h.id+1} MAD transit -> (${p.x.toFixed(2)}, ${p.y.toFixed(2)})`);
      return;
    }

    addLog(`HS-${h.id+1} no mission selected for sea command`);
  }, { passive:false });

  function moveToward(h, tx, ty, dt, speedScale=1.0, turnRate=2.0){
    const dx = tx - h.x;
    const dy = ty - h.y;
    const d = Math.hypot(dx, dy);
    if(d < 0.0001) return d;

    const desired = Math.atan2(dy, dx);
    const diff = wrapHeading(desired - h.heading);
    h.heading += clamp(diff, -turnRate * dt, turnRate * dt);

    const step = h.speed * speedScale * dt;
    h.x += Math.cos(h.heading) * Math.min(step, d);
    h.y += Math.sin(h.heading) * Math.min(step, d);
    return d;
  }

  function updateFuelAndRecovery(h, dt){
    if(h.fuelState === 'OFFSCREEN'){
      h.respawnTimer -= dt;
      if(h.respawnTimer <= 0){
        h.fuel = FUEL_START_LBS;
        h.fuelState = 'RETURN';
        h.phase = 'AI';
        h.x = h.respawnX;
        h.y = h.respawnY;
        h.tx = clamp(h.respawnX - 0.08, SAFE_MARGIN_NM, SEA_NM - SAFE_MARGIN_NM);
        h.ty = clamp(h.respawnY - 0.08, SAFE_MARGIN_NM, SEA_NM - SAFE_MARGIN_NM);
        addLog(`HS-${h.id+1} returned from mother ship`);
      }
      return;
    }

    h.fuel = Math.max(0, h.fuel - FUEL_BURN_PER_SEC * dt);

    if(h.fuelState === 'NORMAL' && h.fuel < FUEL_BINGO_LBS){
      h.fuelState = 'LOW';
      h.phase = 'RTB';
      h.madTrack = false;
      h.snrState = 'NONE';
      h.snrNextTask = null;
      h.madDeployTarget = 0;

      const left = h.x;
      const right = SEA_NM - h.x;
      const top = h.y;
      const bottom = SEA_NM - h.y;
      const minEdge = Math.min(left, right, top, bottom);

      if(minEdge === left){
        h.exitX = -0.18;
        h.exitY = h.y;
      } else if(minEdge === right){
        h.exitX = SEA_NM + 0.18;
        h.exitY = h.y;
      } else if(minEdge === top){
        h.exitX = h.x;
        h.exitY = -0.18;
      } else {
        h.exitX = h.x;
        h.exitY = SEA_NM + 0.18;
      }

      h.respawnX = h.exitX;
      h.respawnY = h.exitY;
      addLog(`HS-${h.id+1} LOW FUEL, returning to mother ship`);
    }
  }

  function updateSubmarine(dt){
    if(submarine.destroyed) return;

    if(submarine.periscopeCooldown > 0) submarine.periscopeCooldown -= dt;

    if(submarine.periscopeUp){
      submarine.periscopeTimer -= dt;
      if(submarine.periscopeTimer <= 0){
        submarine.periscopeUp = false;
        submarine.periscopeCooldown = 20 + Math.random() * 20;
      }
    } else {
      const undetectedTime = state.simTime - state.lastDetectionTime;
      const shouldRaiseBySilence = undetectedTime >= 60 && submarine.periscopeCooldown <= 0;
      const shouldRaiseRare = Math.random() < 0.00035;
      if(shouldRaiseBySilence || shouldRaiseRare){
        submarine.periscopeUp = true;
        submarine.periscopeTimer = 5;
      }
    }

    if(Math.random() < 0.008){
      submarine.targetSpeed = Math.random() * submarine.maxSpeed;
    }

    if(submarine.speed < submarine.targetSpeed){
      submarine.speed = Math.min(submarine.targetSpeed, submarine.speed + submarine.accelPerSec * dt);
    } else if(submarine.speed > submarine.targetSpeed){
      submarine.speed = Math.max(submarine.targetSpeed, submarine.speed - submarine.accelPerSec * dt);
    }

    if(!submarine.turning){
      submarine.straightTimer -= dt;
      if(submarine.straightTimer <= 0){
        submarine.turning = true;
        submarine.turnRemainingDeg = (-30 + Math.random() * 60);
      }
    } else {
      const turnRateDeg = 10 * dt;
      const sign = Math.sign(submarine.turnRemainingDeg);
      const step = Math.min(Math.abs(submarine.turnRemainingDeg), turnRateDeg) * sign;
      submarine.targetHeading += degToRad(step);
      submarine.turnRemainingDeg -= step;

      if(Math.abs(submarine.turnRemainingDeg) <= 0.01){
        submarine.turning = false;
        submarine.straightTimer = 10 + Math.random() * 20;
      }
    }

    const headingDiff = wrapHeading(submarine.targetHeading - submarine.heading);
    const maxTurn = degToRad(10) * dt;
    submarine.heading += clamp(headingDiff, -maxTurn, maxTurn);

    submarine.x += Math.cos(submarine.heading) * submarine.speed * dt;
    submarine.y += Math.sin(submarine.heading) * submarine.speed * dt;

    if(submarine.x < 0.03 || submarine.x > SEA_NM - 0.03){
      submarine.heading = Math.PI - submarine.heading;
      submarine.targetHeading = submarine.heading;
      submarine.x = clamp(submarine.x, 0.03, SEA_NM - 0.03);
    }
    if(submarine.y < 0.03 || submarine.y > SEA_NM - 0.03){
      submarine.heading = -submarine.heading;
      submarine.targetHeading = submarine.heading;
      submarine.y = clamp(submarine.y, 0.03, SEA_NM - 0.03);
    }
  }

  function updateHS(h, dt){
    updateFuelAndRecovery(h, dt);
    if(h.fuelState === 'OFFSCREEN') return;

    h.rotorPhase += 20 * dt;
    if(h.flashTimer > 0) h.flashTimer = Math.max(0, h.flashTimer - dt);
    h.altitude += (h.desiredAltitude - h.altitude) * Math.min(1, dt * 1.8);

    if(h.madDetectCooldown > 0){
      h.madDetectCooldown = Math.max(0, h.madDetectCooldown - dt);
    }

    if(h.madDeploy !== h.madDeployTarget){
      const dir = h.madDeployTarget > h.madDeploy ? 1 : -1;
      h.madDeploy += dir * (dt / 5);
      if((dir > 0 && h.madDeploy > h.madDeployTarget) || (dir < 0 && h.madDeploy < h.madDeployTarget)){
        h.madDeploy = h.madDeployTarget;
      }
    }

    if(h.phase === 'RTB'){
      h.desiredAltitude = 1000;
      moveToward(h, h.exitX, h.exitY, dt, 1.15, 1.8);
      if(h.x < -0.16 || h.x > SEA_NM + 0.16 || h.y < -0.16 || h.y > SEA_NM + 0.16){
        h.fuelState = 'OFFSCREEN';
        h.phase = 'OFFSCREEN';
        h.respawnTimer = 60;
        addLog(`HS-${h.id+1} offscreen / refuel in progress`);
      }
      return;
    }

    if(h.fuelState === 'RETURN'){
      if(dist(h.x, h.y, h.tx, h.ty) < 0.03) h.fuelState = 'NORMAL';
    }

    if(h.madTrack){
      h.madTrackTimer -= dt;
      if(h.madTrackTimer <= 0) h.madTrack = false;
    }

    if(h.mission === 'SNR' || h.snrState !== 'NONE'){
      if(h.snrState === 'APPROACH'){
        moveToward(h, h.gateX, h.gateY, dt, 0.9, 1.2);
        h.desiredAltitude = 150;

        const dg = dist(h.x, h.y, h.gateX, h.gateY);
        const diff = wrapHeading(h.snrApproachHeading - h.heading);
        h.heading += clamp(diff, -1.0 * dt, 1.0 * dt);

        if(dg < 0.02){
          h.heading = h.snrApproachHeading;
          h.snrState = 'DESCEND';
        }
        return;
      }

      if(h.snrState === 'DESCEND'){
        const dx = h.finalX - h.x;
        const dy = h.finalY - h.y;
        const d = Math.hypot(dx, dy);

        if(d > 0.0001){
          const step = h.speed * 0.38 * dt;
          h.x += (dx / d) * Math.min(step, d);
          h.y += (dy / d) * Math.min(step, d);
        }

        h.heading = h.snrApproachHeading;
        h.desiredAltitude = 70;

        if(dist(h.x, h.y, h.finalX, h.finalY) < 0.008 && Math.abs(h.altitude - 70) < 8){
          h.x = h.finalX;
          h.y = h.finalY;
          h.snrState = 'HOVER_WAIT';
          h.snrWaitTimer = 5;
        }
        return;
      }

      if(h.snrState === 'HOVER_WAIT'){
        h.desiredAltitude = 70;
        h.heading = h.snrApproachHeading;
        h.x = h.finalX;
        h.y = h.finalY;
        h.speed = 0;
        h.snrWaitTimer -= dt;
        if(h.snrWaitTimer <= 0){
          h.snrState = 'ACTIVE';
          h.snrPulseTimer = 0;
          h.snrPulseAge = 0;
          addLog(`HS-${h.id+1} sonar active`);
        }
        return;
      }

      if(h.snrState === 'ACTIVE'){
        h.desiredAltitude = 70;
        h.heading = h.snrApproachHeading;
        h.x = h.finalX;
        h.y = h.finalY;
        h.speed = 0;

        h.snrPulseTimer += dt;
        h.snrPulseAge += dt;
        if(h.snrPulseTimer >= 5){
          h.snrPulseTimer = 0;
          h.snrPulseAge = 0;

          if(!submarine.destroyed){
            submarine.targetHeading = Math.atan2(submarine.y - h.y, submarine.x - h.x);
            submarine.targetSpeed = Math.max(submarine.targetSpeed, submarine.maxSpeed * 0.8);
          }

          const maxR = getSnrRangeNm();
          const snrHit = findNearestDetectableContact(h.x, h.y, maxR, 'SNR');
          if(snrHit){
            const target = snrHit.contact;
            const d = snrHit.distance;
            const trueBearing = Math.atan2(target.y - h.y, target.x - h.x);
            const noisyBearing = trueBearing + (-0.10 + Math.random()*0.20) * 0.45;
            const noisyRange = d * (1 + (-0.10 + Math.random()*0.20));
            const cx = clamp(h.x + Math.cos(noisyBearing) * noisyRange, 0, SEA_NM);
            const cy = clamp(h.y + Math.sin(noisyBearing) * noisyRange, 0, SEA_NM);

            let lineStyle = 'solid';
            if(d >= maxR * 0.7) lineStyle = 'dash';
            if(d >= maxR * 0.8 && Math.random() < 0.55){
              h.snrContact = null;
            } else {
              h.snrContact = { x:cx, y:cy, ttl:5, age:0, lineStyle };
              state.contact = { x:cx, y:cy, radiusNm:0.035, sensor:'SNR' };
              state.lastContactTime = nowStamp();
              state.lastContactSensor = `SNR-${target.type}`;
              state.lastContactRadius = '0.04 nm';
              if(target.type === 'SUB') state.lastDetectionTime = state.simTime;
              registerTrack(target, 'SNR', cx, cy);
            }
          } else {
            h.snrContact = null;
          }
        }

        if(h.snrContact){
          h.snrContact.age += dt;
          if(h.snrContact.age > h.snrContact.ttl) h.snrContact = null;
        }
        return;
      }

      if(h.snrState === 'EXIT_WAIT'){
        h.snrWaitTimer -= dt;
        if(h.snrWaitTimer <= 0) h.snrState = 'EXITING';
        return;
      }

      if(h.snrState === 'EXITING'){
        h.desiredAltitude = 400;
        const fx = h.x + Math.cos(h.heading) * 0.06;
        const fy = h.y + Math.sin(h.heading) * 0.06;
        moveToward(h, fx, fy, dt, 1.0, 2.0);
        if(h.altitude > 320){
          if(h.snrNextTask){
            h.finalX = h.snrNextTask.finalX;
            h.finalY = h.snrNextTask.finalY;
            h.gateX = h.snrNextTask.gateX;
            h.gateY = h.snrNextTask.gateY;
            h.tx = h.gateX;
            h.ty = h.gateY;
            h.snrApproachHeading = h.snrNextTask.approachHeading;
            h.snrNextTask = null;
            h.snrState = 'APPROACH';
            h.phase = 'MANUAL';
            h.desiredAltitude = 150;
            h.speed = HS_MAX_SPEED;
          } else {
            h.snrState = 'NONE';
            h.phase = 'AI';
            h.speed = HS_MAX_SPEED;
          }
        }
        return;
      }
    }

    if(h.mission === 'MAD' && h.madTrack){
      h.desiredAltitude = 400;
      h.madAngle += 1.0 * dt;

      const orbitR = h.madOrbitRadius || 0.10;
      h.tx = clamp(h.madCenterX + Math.cos(h.madAngle) * orbitR, SAFE_MARGIN_NM, SEA_NM - SAFE_MARGIN_NM);
      h.ty = clamp(h.madCenterY + Math.sin(h.madAngle) * orbitR, SAFE_MARGIN_NM, SEA_NM - SAFE_MARGIN_NM);

      moveToward(h, h.tx, h.ty, dt, 0.92, 0.85);
      return;
    }

    if(h.phase === 'TRANSIT'){
      moveToward(h, h.tx, h.ty, dt, 1.0, (h.mission === 'MAD' || h.mission === 'SONO') ? 1.35 : 2.4);
      if(dist(h.x, h.y, h.tx, h.ty) < 0.03){
        if(h.mission === 'SONO') h.phase = 'AI';
        else if(h.mission === 'MAD') h.phase = 'AI';
        else h.phase = 'IDLE';
      }
      return;
    }

    if(h.phase === 'AI' || h.phase === 'IDLE' || h.mission === 'RADAR' || h.phase === 'MANUAL'){
      if(h.mission === 'MAD') h.desiredAltitude = 400;
      else h.desiredAltitude = 1000;

      const tooNearEdge = (
        h.x < SAFE_MARGIN_NM || h.x > SEA_NM - SAFE_MARGIN_NM ||
        h.y < SAFE_MARGIN_NM || h.y > SEA_NM - SAFE_MARGIN_NM
      );

      const d = dist(h.x, h.y, h.tx, h.ty);
      if(d < 0.03 || tooNearEdge){
        h.tx = clamp(h.x + (Math.random() - 0.5) * 0.45, SAFE_MARGIN_NM, SEA_NM - SAFE_MARGIN_NM);
        h.ty = clamp(h.y + (Math.random() - 0.5) * 0.45, SAFE_MARGIN_NM, SEA_NM - SAFE_MARGIN_NM);
      }

      h.x = clamp(h.x, SAFE_MARGIN_NM * 0.90, SEA_NM - SAFE_MARGIN_NM * 0.90);
      h.y = clamp(h.y, SAFE_MARGIN_NM * 0.90, SEA_NM - SAFE_MARGIN_NM * 0.90);

      moveToward(h, h.tx, h.ty, dt, 0.9, 1.25);
    }
  }

  function updateTracks(dt){
    state.trackCycleTimer += dt;

    for(const t of state.tracks){
      if(t.target && !t.target.destroyed){
        t.conditionTimer += dt;
        if(t.conditionTimer >= 2){
          t.conditionTimer = 0;
          t.displayHeadingDeg = canvasRadToCompassDeg(t.target.heading || 0);
          t.displaySpeedKt = (t.target.speed || 0) * 3600;
        }
      }
    }

    state.tracks = state.tracks.filter(t =>
      (state.simTime - t.lastSeen) <= TRACK_EXPIRE_SEC &&
      (!t.target || !t.target.destroyed)
    );

    const active = getActiveTracks();
    if(active.length === 0){
      state.trackDisplayIndex = 0;
      state.trackCycleTimer = 0;
    } else if(active.length > 1 && state.trackCycleTimer >= 2){
      state.trackCycleTimer = 0;
      state.trackDisplayIndex = (state.trackDisplayIndex + 1) % active.length;
    }
  }

  function launchTorpedo(){
    if(state.torpedo) return;

    const h = state.selected;
    const track = getDisplayedTrack();
    if(!h || !track) return;

    const isSNRShot = (h.mission === 'SNR' && (h.snrState === 'ACTIVE' || h.snrState === 'HOVER_WAIT'));
    const willHit = Math.random() < 0.9;

    if(isSNRShot){
      const heading = Math.atan2(track.y - h.y, track.x - h.x);
      state.torpedo = {
        mode:'direct',
        x:h.x,
        y:h.y,
        heading,
        speed:TORPEDO_SPEED_NMPS,
        target:track.target,
        willHit
      };
      addLog(`HS-${h.id+1} TORPEDO AWAY (STRAIGHT RUN)`);
    } else if(h.mission === 'SONO' || h.mission === 'MAD'){
      state.torpedo = {
        mode:'search',
        x:h.x,
        y:h.y,
        heading:h.heading,
        speed:TORPEDO_SPEED_NMPS,
        target:track.target,
        willHit,
        centerX:h.x,
        centerY:h.y,
        searchAngle:0,
        searchRadius:0.06
      };
      addLog(`HS-${h.id+1} TORPEDO AWAY (SEARCH RUN)`);
    } else {
      addLog('ATTACK NOT AVAILABLE');
      return;
    }

    updateUI();
  }

  function triggerExplosion(x, y){
    state.explosions.push({
      x, y,
      age:0,
      life:2.5
    });
  }

  function hitTarget(target){
    if(!target || target.destroyed) return;
    target.destroyed = true;
    triggerExplosion(target.x, target.y);
    addLog(`${target.type} HIT`);
    state.tracks = state.tracks.filter(t => t.target !== target);

    if(target === submarine){
      state.contact = null;
      state.madContacts = [];
      helicopters.forEach(h => {
        h.snrContact = null;
        h.madTrack = false;
      });
    }
  }

  function updateTorpedo(dt){
    const torp = state.torpedo;
    if(!torp) return;

    const target = torp.target && !torp.target.destroyed ? torp.target : null;

    if(torp.mode === 'direct'){
      torp.x += Math.cos(torp.heading) * torp.speed * dt;
      torp.y += Math.sin(torp.heading) * torp.speed * dt;

      if(torp.willHit && target && dist(torp.x, torp.y, target.x, target.y) < TORPEDO_HIT_RANGE_NM){
        hitTarget(target);
        state.torpedo = null;
        return;
      }
    }

    else if(torp.mode === 'search'){
      torp.searchAngle += 1.7 * dt;
      torp.x = torp.centerX + Math.cos(torp.searchAngle) * torp.searchRadius;
      torp.y = torp.centerY + Math.sin(torp.searchAngle) * torp.searchRadius;

      if(target && dist(torp.x, torp.y, target.x, target.y) <= TORPEDO_SEEK_RANGE_NM){
        torp.heading = Math.atan2(target.y - torp.y, target.x - torp.x);
        torp.mode = torp.willHit ? 'home' : 'miss_run';
      }
    }

    else if(torp.mode === 'home'){
      if(!target){
        state.torpedo = null;
        return;
      }

      torp.heading = Math.atan2(target.y - torp.y, target.x - torp.x);
      torp.x += Math.cos(torp.heading) * torp.speed * dt;
      torp.y += Math.sin(torp.heading) * torp.speed * dt;

      if(dist(torp.x, torp.y, target.x, target.y) < TORPEDO_HIT_RANGE_NM){
        hitTarget(target);
        state.torpedo = null;
        return;
      }
    }

    else if(torp.mode === 'miss_run'){
      torp.x += Math.cos(torp.heading) * torp.speed * dt;
      torp.y += Math.sin(torp.heading) * torp.speed * dt;
    }

    if(torp.x < -0.12 || torp.x > SEA_NM + 0.12 || torp.y < -0.12 || torp.y > SEA_NM + 0.12){
      state.torpedo = null;
      addLog('TORPEDO OUT OF AREA');
    }
  }

  function updateExplosions(dt){
    for(let i = state.explosions.length - 1; i >= 0; i--){
      state.explosions[i].age += dt;
      if(state.explosions[i].age >= state.explosions[i].life){
        state.explosions.splice(i, 1);
      }
    }
  }

  function updateBuoyBearings(dt){
    for(let i = state.buoys.length - 1; i >= 0; i--){
      const b = state.buoys[i];
      b.ttl -= dt;
      b.bearingTimer += dt;

      const sonoHit = findNearestDetectableContact(b.x, b.y, b.rangeNm, 'SONO');
      if(!sonoHit){
        b.bearingLine = null;
      } else {
        const d = sonoHit.distance;
        const ratio = d / b.rangeNm;
        if(ratio >= b.lostThreshold){
          b.bearingLine = null;
        } else {
          if(!b.bearingLine || b.bearingTimer >= 2){
            b.bearingTimer = 0;
            const target = sonoHit.contact;
            const trueBearing = Math.atan2(target.y - b.y, target.x - b.x);
            b.bearingLine = {
              bearing: trueBearing + degToRad(-10 + Math.random() * 20)
            };
            registerTrack(target, 'SONO', target.x, target.y);
          }
        }
      }

      if(b.ttl <= 0) state.buoys.splice(i, 1);
    }

    const active = state.buoys.filter(b => b.bearingLine);
    if(active.length >= 2 && !submarine.destroyed){
      const b1 = active[0], b2 = active[1];
      const p1 = {x:b1.x, y:b1.y};
      const p2 = {x:b2.x, y:b2.y};
      const a1 = b1.bearingLine.bearing, a2 = b2.bearingLine.bearing;
      const d1 = {x:Math.cos(a1), y:Math.sin(a1)};
      const d2 = {x:Math.cos(a2), y:Math.sin(a2)};
      const denom = d1.x * d2.y - d1.y * d2.x;

      if(Math.abs(denom) > 0.0001){
        const dx = p2.x - p1.x, dy = p2.y - p1.y;
        const t1 = (dx * d2.y - dy * d2.x) / denom;
        const ix = p1.x + d1.x * t1;
        const iy = p1.y + d1.y * t1;

        if(ix >= 0 && ix <= SEA_NM && iy >= 0 && iy <= SEA_NM){
          state.contact = {x:ix, y:iy, radiusNm:0.07, sensor:'SONO-FIX'};
          state.lastContactTime = nowStamp();
          state.lastContactSensor = 'SONO-FIX';
          state.lastContactRadius = '0.07 nm';
          state.lastDetectionTime = state.simTime;
          registerTrack(submarine, 'SONO-FIX', ix, iy);
        }
      }
    }
  }

  function updateMadDetection(dt){
    for(const h of helicopters){
      if(h.mission !== 'MAD') continue;
      if(h.madDeploy < 0.95) continue;
      if(h.fuelState === 'LOW' || h.fuelState === 'OFFSCREEN') continue;
      if(h.madDetectCooldown > 0) continue;

      const madHit = findNearestDetectableContact(h.x, h.y, getMadRangeNm(), 'MAD');
      if(h.altitude <= 500 && madHit){
        const target = madHit.contact;
        const mx = clamp(target.x + (Math.random() - 0.5) * 0.015, 0, SEA_NM);
        const my = clamp(target.y + (Math.random() - 0.5) * 0.015, 0, SEA_NM);

        state.madContacts = [{x:mx, y:my, life:60}];

        h.madTrack = true;
        h.madCenterX = mx;
        h.madCenterY = my;
        h.madAngle = Math.atan2(h.y - my, h.x - mx);
        h.madTrackTimer = 25;
        h.madDetectCooldown = 20;
        h.madOrbitRadius = 0.12;

        state.contact = {x:mx, y:my, radiusNm:0.08, sensor:'MAD'};
        state.lastContactTime = nowStamp();
        state.lastContactSensor = `MAD-${target.type}`;
        state.lastContactRadius = '0.08 nm';
        if(target.type === 'SUB') state.lastDetectionTime = state.simTime;
        registerTrack(target, 'MAD', mx, my);
      }
    }

    for(let i = state.madContacts.length - 1; i >= 0; i--){
      state.madContacts[i].life -= dt;
      if(state.madContacts[i].life <= 0) state.madContacts.splice(i, 1);
    }
  }

  function update(dt){
    state.simTime += dt;
    updateSubmarine(dt);
    updateFalseTargets(dt);
    helicopters.forEach(h => updateHS(h, dt));
    updateBuoyBearings(dt);
    updateMadDetection(dt);
    updateTracks(dt);
    updateTorpedo(dt);
    updateExplosions(dt);
  }

  function drawSea(){
    const grad = ctx.createLinearGradient(0, 0, 0, state.height);
    grad.addColorStop(0.00, "#0c4a6a");
    grad.addColorStop(0.40, "#0a3b58");
    grad.addColorStop(1.00, "#082635");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, state.width, state.height);

    const tm = performance.now() * 0.00005;
    for(let i=0;i<10;i++){
      const px = ((i * 173 + tm * 900) % (state.width + 160)) - 80;
      const py = (i * 113) % state.height;
      ctx.fillStyle = "rgba(255,255,255,0.015)";
      ctx.fillRect(px, py, 120, 2);
    }

    drawWhitecaps();
  }

  function drawWhitecaps(){
    const now = performance.now() * 0.001;
    const wr = compassToCanvasRad(WIND_FROM_DEG + 180);
    const wx = Math.cos(wr);
    const wy = Math.sin(wr);
    const angleBase = wr + Math.PI / 2;
    const count = state.whitecapSeedCount;

    for(let i = 0; i < count; i++){
      const seed = i * 91.173;
      const life = ((now * 0.34 + seed) % 1.0);
      const alpha = Math.sin(life * Math.PI);

      const bx = ((seed * 137.21) % 1) * state.width;
      const by = ((seed * 271.73) % 1) * state.height;

      const drift = life * 8.5;
      const x = bx + wx * drift;
      const y = by + wy * drift;

      const r = 3.4 + ((seed * 47.3) % 1) * 4.6;
      const arc = 0.45 + ((seed * 19.7) % 1) * 0.55;

      ctx.beginPath();
      ctx.arc(x, y, r, angleBase - arc/2, angleBase + arc/2);
      ctx.strokeStyle = `rgba(255,255,255,${0.40 * alpha})`;
      ctx.lineWidth = 1;
      ctx.stroke();

      if(((seed * 13.7) % 1) > 0.58){
        ctx.beginPath();
        ctx.arc(
          x + wx * 1.5 - wy * 1.0,
          y + wy * 1.5 + wx * 1.0,
          r * 0.65,
          angleBase - arc * 0.35,
          angleBase + arc * 0.35
        );
        ctx.strokeStyle = `rgba(255,255,255,${0.24 * alpha})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }
  }

  function drawDownwashAt(x, y, heading, baseSize){
    const t = performance.now() * 0.02;

    const offsetRatio = Math.min(WIND_SPEED_KT / 30, 1) * 0.5;
    const offsetDist = baseSize * offsetRatio;

    const backX = -Math.sin(heading);
    const backY =  Math.cos(heading);

    const cx = x + backX * offsetDist;
    const cy = y + backY * offsetDist + baseSize * 0.25;

    const r1 = baseSize * (0.28 + Math.sin(t) * 0.015);
    const r2 = baseSize * (0.45 + Math.sin(t * 0.85) * 0.02);

    const coreA = 0.4 + Math.sin(t * 1.8) * 0.05;
    const outerA = 0.1 + Math.sin(t * 1.3) * 0.03;

    const g1 = ctx.createRadialGradient(cx, cy, 0, cx, cy, r1);
    g1.addColorStop(0.0, `rgba(255,255,255,${coreA})`);
    g1.addColorStop(0.6, `rgba(255,255,255,${coreA * 0.6})`);
    g1.addColorStop(1.0, `rgba(255,255,255,0)`);

    ctx.beginPath();
    ctx.arc(cx, cy, r1, 0, Math.PI * 2);
    ctx.fillStyle = g1;
    ctx.fill();

    const g2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, r2);
    g2.addColorStop(0.0, `rgba(255,255,255,${outerA})`);
    g2.addColorStop(0.7, `rgba(255,255,255,${outerA * 0.5})`);
    g2.addColorStop(1.0, `rgba(255,255,255,0)`);

    ctx.beginPath();
    ctx.arc(cx, cy, r2, 0, Math.PI * 2);
    ctx.fillStyle = g2;
    ctx.fill();
  }

  function drawHelicopterSprite(h, isSelected = false){
    if(h.fuelState === 'OFFSCREEN') return;

    const x = nmX(h.x);
    const y = nmY(h.y);

    const altitudeScale =
      h.altitude <= 180 ? 0.90 :
      h.altitude <= 450 ? 0.97 : 1.06;

    const baseSize = Math.max(24, state.height * HS_SIZE_RATIO * 0.80 * altitudeScale);
    const rotorR = baseSize * 0.44;

    if(isSelected || h.flashTimer > 0){
      ctx.beginPath();
      ctx.arc(x, y, baseSize * 0.68, 0, Math.PI * 2);
      const a = h.flashTimer > 0 ? 1.0 : 0.95;
      ctx.strokeStyle = `rgba(119,231,255,${a})`;
      ctx.lineWidth = h.flashTimer > 0 ? 3 : 2;
      ctx.stroke();
    }
    if(h.flashTimer > 0){
      ctx.beginPath();
      ctx.arc(x, y, baseSize * 0.82, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,255,255,${Math.min(1, h.flashTimer / 0.18)})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(h.heading + Math.PI / 2);

    if(h.mission === "SNR" && (h.snrState === "HOVER_WAIT" || h.snrState === "ACTIVE")){
      drawDownwashAt(0, 18, h.heading, baseSize);
    }

    ctx.beginPath();
    ctx.arc(0, 0, rotorR, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(220,240,255,0.05)";
    ctx.fill();
    ctx.strokeStyle = "rgba(220,240,255,0.14)";
    ctx.lineWidth = 1;
    ctx.stroke();

    const spin = performance.now() * 0.03;
    ctx.save();
    ctx.rotate(spin);
    for(let i = 0; i < 4; i++){
      ctx.rotate(Math.PI / 2);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, -rotorR);
      ctx.strokeStyle = "rgba(220,240,255,0.55)";
      ctx.lineWidth = 1.8;
      ctx.stroke();
    }
    ctx.restore();

    ctx.beginPath();
    ctx.arc(0, 0, baseSize * 0.08, 0, Math.PI * 2);
    ctx.fillStyle = "#8f9da7";
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(-baseSize * 0.07, baseSize * 0.14);
    ctx.lineTo(baseSize * 0.07, baseSize * 0.14);
    ctx.lineTo(baseSize * 0.045, baseSize * 0.78);
    ctx.lineTo(-baseSize * 0.045, baseSize * 0.78);
    ctx.closePath();
    ctx.fillStyle = "#d7e3ea";
    ctx.fill();
    ctx.strokeStyle = "#2b3940";
    ctx.lineWidth = 1.1;
    ctx.stroke();

    ctx.beginPath();
    ctx.ellipse(0, -baseSize * 0.02, baseSize * 0.22, baseSize * 0.38, 0, 0, Math.PI * 2);
    ctx.fillStyle = "#d7e3ea";
    ctx.fill();
    ctx.strokeStyle = "#2b3940";
    ctx.lineWidth = 1.2;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0, -baseSize * 0.60);
    ctx.bezierCurveTo(
      baseSize * 0.16, -baseSize * 0.48,
      baseSize * 0.14, -baseSize * 0.22,
      0, -baseSize * 0.16
    );
    ctx.bezierCurveTo(
      -baseSize * 0.14, -baseSize * 0.22,
      -baseSize * 0.16, -baseSize * 0.48,
      0, -baseSize * 0.60
    );
    ctx.closePath();
    ctx.fillStyle = "#d7e3ea";
    ctx.fill();
    ctx.strokeStyle = "#2b3940";
    ctx.lineWidth = 1.0;
    ctx.stroke();

    ctx.fillStyle = "#bcc9d1";
    ctx.fillRect(-baseSize * 0.09, -baseSize * 0.20, baseSize * 0.18, baseSize * 0.10);

    ctx.fillStyle = "#aabac4";
    ctx.fillRect(-baseSize * 0.31, -baseSize * 0.10, baseSize * 0.14, baseSize * 0.22);
    ctx.fillRect(baseSize * 0.17, -baseSize * 0.10, baseSize * 0.14, baseSize * 0.22);

    ctx.strokeStyle = "#1f2a30";
    ctx.lineWidth = 1.1;
    ctx.beginPath();
    ctx.moveTo(-baseSize * 0.19, baseSize * 0.02);
    ctx.lineTo(-baseSize * 0.28, baseSize * 0.17);
    ctx.moveTo(baseSize * 0.19, baseSize * 0.02);
    ctx.lineTo(baseSize * 0.28, baseSize * 0.17);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(-baseSize * 0.30, baseSize * 0.19, baseSize * 0.04, 0, Math.PI * 2);
    ctx.arc(baseSize * 0.30, baseSize * 0.19, baseSize * 0.04, 0, Math.PI * 2);
    ctx.fillStyle = "#2d2d2d";
    ctx.fill();

    ctx.fillStyle = "#c9d5dc";
    ctx.fillRect(-baseSize * 0.20, baseSize * 0.70, baseSize * 0.40, baseSize * 0.05);

    ctx.beginPath();
    ctx.moveTo(-baseSize * 0.06, baseSize * 0.72);
    ctx.lineTo(baseSize * 0.06, baseSize * 0.72);
    ctx.lineTo(baseSize * 0.03, baseSize * 0.94);
    ctx.lineTo(-baseSize * 0.03, baseSize * 0.94);
    ctx.closePath();
    ctx.fillStyle = "#d2dde4";
    ctx.fill();

    ctx.fillStyle = "#bfcbd3";
    ctx.fillRect(-baseSize * 0.08, baseSize * 0.91, baseSize * 0.16, baseSize * 0.04);

    ctx.save();
    ctx.translate(0, baseSize * 0.93);
    ctx.rotate(spin * 1.6);
    for(let i = 0; i < 4; i++){
      ctx.rotate(Math.PI / 2);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, -baseSize * 0.14);
      ctx.strokeStyle = "rgba(220,240,255,0.75)";
      ctx.lineWidth = 1.4;
      ctx.stroke();
    }
    ctx.restore();

    if(h.madDeploy > 0.01){
      const cableLen = baseSize * (0.18 + 0.42 * h.madDeploy);
      const bodyY = baseSize * 1.05 + cableLen;

      ctx.beginPath();
      ctx.moveTo(0, baseSize * 0.98);
      ctx.lineTo(0, bodyY - baseSize * 0.10);
      ctx.strokeStyle = "rgba(220,220,220,0.75)";
      ctx.lineWidth = 1.1;
      ctx.stroke();

      const bodyW = baseSize * 0.10;
      const bodyH = baseSize * 0.22;

      ctx.save();
      ctx.translate(0, bodyY);
      ctx.fillStyle = "#f2d14a";
      ctx.fillRect(-bodyW/2, -bodyH/2, bodyW, bodyH);
      ctx.fillStyle = "#ff4d4d";
      ctx.fillRect(-bodyW/2, -bodyH/2, bodyW/2, bodyH/2);
      ctx.fillRect(0, 0, bodyW/2, bodyH/2);
      ctx.strokeStyle = "#222";
      ctx.lineWidth = 1;
      ctx.strokeRect(-bodyW/2, -bodyH/2, bodyW, bodyH);
      ctx.restore();
    }

    let light = "#9eff9e";
    if(h.mission === "MAD") light = "#ffe08a";
    if(h.mission === "SNR") light = "#9fe8ff";
    if(h.phase === "TRANSIT") light = "#c9f2ff";
    if(h.fuelState === "LOW") light = "#ff7f7f";

    ctx.beginPath();
    ctx.arc(0, baseSize * 0.08, baseSize * 0.075, 0, Math.PI * 2);
    ctx.fillStyle = light;
    ctx.fill();

    ctx.restore();

    ctx.fillStyle = h.fuelState === 'LOW' ? "rgba(255,160,160,0.95)" : "rgba(255,255,255,0.90)";
    ctx.font = "11px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(`HS-${h.id + 1}`, x, y + baseSize * 1.05);
  }

  function drawSonoBearings(){
    for(const b of state.buoys){
      if(!b.bearingLine) continue;
      const x = nmX(b.x), y = nmY(b.y);
      const len = b.rangeNm / SEA_NM * state.width * 2.0;
      const bx = x + Math.cos(b.bearingLine.bearing) * len;
      const by = y + Math.sin(b.bearingLine.bearing) * len;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(bx, by);
      ctx.strokeStyle = 'rgba(120,255,160,0.95)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  function drawSnrEffects(){
    const snrRange = getSnrRangeNm();

    for(const h of helicopters){
      if(h.mission !== 'SNR') continue;
      if(!['HOVER_WAIT','ACTIVE'].includes(h.snrState)) continue;

      const hx = nmX(h.x);
      const hy = nmY(h.y);
      const maxR = snrRange / SEA_NM * state.width;

      ctx.beginPath();
      ctx.arc(hx, hy, maxR, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(120,220,255,0.28)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      const pulseT = h.snrPulseAge / 5;
      if(pulseT >= 0 && pulseT <= 1){
        const r = Math.max(2, maxR * pulseT);
        ctx.beginPath();
        ctx.arc(hx, hy, r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(140,240,255,${0.9 * (1 - pulseT)})`;
        ctx.lineWidth = 2.4;
        ctx.stroke();
      }

      if(h.snrContact){
        const cx = nmX(h.snrContact.x);
        const cy = nmY(h.snrContact.y);

        ctx.beginPath();
        ctx.moveTo(hx, hy);
        ctx.lineTo(cx, cy);

        if(h.snrContact.lineStyle === 'dash') ctx.setLineDash([6,5]);
        else ctx.setLineDash([]);

        ctx.strokeStyle = 'rgba(160,245,255,0.95)';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.beginPath();
        ctx.arc(cx, cy, 5.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(180,250,255,0.95)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.35)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }
  }

  function drawContact(){
    if(!state.contact) return;
    const x = nmX(state.contact.x), y = nmY(state.contact.y);
    const r = (state.contact.radiusNm || 0.06) / SEA_NM * state.width;

    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,205,80,0.08)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,220,100,0.65)';
    ctx.lineWidth = 2;
    ctx.setLineDash([7,5]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function drawPlannedPoint(){
    if(!state.plannedPoint) return;

    const x = nmX(state.plannedPoint.x);
    const y = nmY(state.plannedPoint.y);
    const t = performance.now() * 0.004;

    ctx.beginPath();
    ctx.arc(x, y, 7 + Math.sin(t) * 1.2, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.92)';
    ctx.lineWidth = 1.8;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x - 10, y);
    ctx.lineTo(x + 10, y);
    ctx.moveTo(x, y - 10);
    ctx.lineTo(x, y + 10);
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }

  function drawPeriscopeGlint(){
    if(submarine.destroyed || !submarine.periscopeUp) return;
    const x = nmX(submarine.x);
    const y = nmY(submarine.y);
    const t = performance.now() * 0.01;

    ctx.fillStyle = "rgba(255,255,255,0.95)";
    ctx.fillRect(Math.round(x), Math.round(y), 1, 1);

    if(Math.sin(t) > 0){
      ctx.fillStyle = "rgba(255,255,255,0.35)";
      ctx.fillRect(Math.round(x) - 1, Math.round(y), 3, 1);
    }
  }

  function drawTorpedo(){
    const torp = state.torpedo;
    if(!torp) return;

    const x = nmX(torp.x);
    const y = nmY(torp.y);
    const angle = torp.mode === 'search' ? torp.searchAngle + Math.PI / 2 : torp.heading + Math.PI / 2;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    ctx.beginPath();
    ctx.moveTo(0, -8);
    ctx.lineTo(4, 6);
    ctx.lineTo(-4, 6);
    ctx.closePath();
    ctx.fillStyle = "rgba(240,240,220,0.95)";
    ctx.fill();
    ctx.strokeStyle = "rgba(60,60,60,0.8)";
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.restore();
  }

  function drawExplosions(){
    for(const ex of state.explosions){
      const x = nmX(ex.x);
      const y = nmY(ex.y);
      const t = ex.age / ex.life;
      const r1 = 10 + t * 60;
      const r2 = 22 + t * 85;

      ctx.beginPath();
      ctx.arc(x, y, r1, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(220,245,255,${0.65 * (1 - t)})`;
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(x, y, r2, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(180,220,255,${0.45 * (1 - t)})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  function draw(){
    drawSea();

    for(const b of state.buoys){
      const x = nmX(b.x), y = nmY(b.y);
      const rr = b.rangeNm / SEA_NM * state.width;

      ctx.beginPath();
      ctx.arc(x, y, rr, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(120,190,150,0.24)";
      ctx.lineWidth = 1.2;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(x, y, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(170,220,190,0.75)";
      ctx.fill();
    }

    drawSonoBearings();
    drawContact();
    drawSnrEffects();
    drawPlannedPoint();
    drawPeriscopeGlint();

    for(const m of state.madContacts){
      const x = nmX(m.x), y = nmY(m.y);
      const a = Math.max(0.25, Math.min(1, m.life / 60));
      ctx.save();
      ctx.translate(x, y);
      ctx.beginPath();
      ctx.arc(0, 0, 11, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,210,90,${0.8*a})`;
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = `rgba(255,235,160,${0.95*a})`;
      ctx.font = "bold 12px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("M", 0, 1);
      ctx.restore();
    }

    drawTorpedo();
    drawExplosions();

    const drawOrder = [...helicopters]
      .filter(h => h.fuelState !== 'OFFSCREEN')
      .sort((a, b) => a.altitude - b.altitude);

    drawOrder.forEach(h => drawHelicopterSprite(h, state.selected === h));
  }

  function loop(ts){
    if(!state.lastFrame) state.lastFrame = ts;
    const dt = Math.min(0.05, (ts - state.lastFrame) / 1000);
    state.lastFrame = ts;

    update(dt);
    draw();
    updateUI();

    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', resize);
  resize();
  addLog('SYSTEM READY: HS 3機 AUTO radar sweep');
  addLog(`FALSE TARGETS: THERMAL ${falseTargets.filter(t=>t.type==='THERMAL').length} / WHALE ${falseTargets.filter(t=>t.type==='WHALE').length} / WRECK ${falseTargets.filter(t=>t.type==='WRECK').length}`);
  updateUI();
  requestAnimationFrame(loop);
})();
</script>
</body>
