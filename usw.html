<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLab USW Simulator</title>
<style>
  body { margin:0; display:flex; background:#000; color:#0f0; font-family:monospace; }
  canvas { flex:4; background:#000; }
  #panel { flex:1; background:#111; padding:10px; }
  button { width:100%; margin:4px 0; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="panel">
  <div id="info">NO SELECTION</div>
  <button onclick="setMission('SNR')">SNR</button>
  <button onclick="setMission('SONO')">SONO</button>
  <button onclick="setMission('MAD')">MAD</button>
  <button onclick="launch()">LAUNCH</button>
</div>

<script>

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){
  canvas.width = window.innerWidth * 0.8;
  canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

const SEA_NM = 2;

function rand(a,b){ return a + Math.random()*(b-a); }

let helicopters = [];
let buoys = [];
let madContacts = [];

let selected = null;

let submarine = {
  x: rand(0.3,1.7),
  y: rand(0.3,1.7),
  heading: Math.random()*Math.PI*2,
  speed: 0.02
};

function createHS(x,y,id){
  return {
    id,
    x,y,
    tx:x, ty:y,
    mission:'RADAR',
    altitude:1000,
    phase:'AI',
    snrState:'NONE',
    madTrack:false,
    madAngle:0,
    speed:0.02
  };
}

helicopters = [
  createHS(1,0.1,0),
  createHS(0.1,1.8,1),
  createHS(1.9,1.8,2)
];

canvas.onclick = e=>{
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX-rect.left)/rect.width*SEA_NM;
  const y = (e.clientY-rect.top)/rect.height*SEA_NM;

  // HS選択
  for(let h of helicopters){
    let dx = h.x-x;
    let dy = h.y-y;
    if(Math.hypot(dx,dy)<0.05){
      selected = h;
      return;
    }
  }

  if(!selected) return;

  if(selected.mission==='SNR'){
    selected.tx = x;
    selected.ty = y;
    selected.snrState = 'APPROACH';
  } else {
    selected.tx = x;
    selected.ty = y;
    selected.phase = 'TRANSIT';
    selected.madTrack = false;
  }
};

function setMission(m){
  if(!selected) return;
  selected.mission = m;
}

function launch(){
  if(!selected) return;
  if(selected.mission==='SONO'){
    buoys.push({x:selected.x,y:selected.y,life:60});
  }
}

function update(dt){

  // 潜水艦移動
  submarine.x += Math.cos(submarine.heading)*submarine.speed*dt;
  submarine.y += Math.sin(submarine.heading)*submarine.speed*dt;

  // HS更新
  helicopters.forEach(h=>{

    // SNR処理
    if(h.mission==='SNR'){
      if(h.snrState==='APPROACH'){
        move(h, h.tx, h.ty, dt);
        if(dist(h,h.tx,h.ty)<0.05){
          h.snrState='HOVER';
          h.timer=5;
        }
      }
      else if(h.snrState==='HOVER'){
        h.timer-=dt;
        if(h.timer<=0){
          h.snrState='ACTIVE';
        }
      }
      else if(h.snrState==='ACTIVE'){
        let d = dist(h,submarine.x,submarine.y);
        if(d<0.05){
          // 探知
        }
      }
      return;
    }

    // MAD追尾
    if(h.mission==='MAD' && h.madTrack){
      h.madAngle += dt;
      let r=0.07;
      h.tx = h.mx + Math.cos(h.madAngle)*r;
      h.ty = h.my + Math.sin(h.madAngle)*r;
    }

    // 通常移動
    move(h,h.tx,h.ty,dt);

    // 到達後AI復帰
    if(dist(h,h.tx,h.ty)<0.05){
      h.phase='AI';
    }

    // MAD探知
    if(h.mission==='MAD'){
      let d = dist(h,submarine.x,submarine.y);
      if(d<0.025){
        madContacts.push({x:submarine.x,y:submarine.y,life:60});
        h.madTrack=true;
        h.mx=submarine.x;
        h.my=submarine.y;
      }
    }

  });

  // ソノブイ更新
  buoys.forEach(b=>{
    b.life-=dt;
  });

  madContacts.forEach(m=>m.life-=dt);

  buoys = buoys.filter(b=>b.life>0);
  madContacts = madContacts.filter(m=>m.life>0);
}

function move(h,x,y,dt){
  let dx=x-h.x;
  let dy=y-h.y;
  let d=Math.hypot(dx,dy);
  if(d>0.001){
    h.x+=dx/d*h.speed*dt;
    h.y+=dy/d*h.speed*dt;
  }
}

function dist(h,x,y){
  return Math.hypot(h.x-x,h.y-y);
}

function draw(){

  ctx.fillStyle="#082635";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // 潜水艦（デバッグ）
  ctx.fillStyle="red";
  drawCircle(submarine.x,submarine.y,4);

  // ソノブイ
  ctx.strokeStyle="lime";
  buoys.forEach(b=>{
    drawCircle(b.x,b.y,20);
  });

  // MAD
  madContacts.forEach(m=>{
    let x=nmX(m.x), y=nmY(m.y);
    ctx.strokeStyle="yellow";
    ctx.beginPath();
    ctx.arc(x,y,10,0,Math.PI*2);
    ctx.stroke();
    ctx.fillText("M",x,y);
  });

  // HS
  helicopters.forEach(h=>{
    ctx.fillStyle = (h===selected)?"cyan":"white";
    drawCircle(h.x,h.y,6);
  });

}

function nmX(x){ return x/SEA_NM*canvas.width; }
function nmY(y){ return y/SEA_NM*canvas.height; }

function drawCircle(x,y,r){
  ctx.beginPath();
  ctx.arc(nmX(x),nmY(y),r,0,Math.PI*2);
  ctx.fill();
}

let last=0;
function loop(t){
  let dt=(t-last)/1000;
  last=t;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
