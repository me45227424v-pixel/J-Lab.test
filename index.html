<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J-Lab Tactical Display</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --green:#00d94f;
  --green-dim:rgba(0,217,79,0.3);
  --amber:#ffb347;
}

body{
  margin:0;
  background:#000;
  color:var(--green);
  font-family:"VT323",monospace;
  overflow:hidden;
}

/* スキャンライン */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(0,217,79,0.02) 0px,
    rgba(0,217,79,0.02) 1px,
    transparent 1px,
    transparent 3px
  );
}

/* BOOT */
.boot{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  font-size:24px;
  text-align:center;
  z-index:10;
}
.hidden{display:none;}

/* 上部ライン */
.boot-line{
  position:fixed;
  top:0;
  left:0;
  height:2px;
  width:0;
  background:var(--green);
  animation:scan 0.8s forwards;
}
@keyframes scan{to{width:100%;}}

/* ステータス */
.status{
  position:fixed;
  top:12px;
  left:14px;
  font-size:20px;
  line-height:1.1;
  text-shadow:0 0 4px rgba(0,217,79,0.3);
}

/* 中央 */
.screen{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:14vh;
}

.title{
  font-family:"Share Tech Mono",monospace;
  font-size:72px;
  letter-spacing:0.15em;
  margin-bottom:36px;
  text-shadow:0 0 8px rgba(0,217,79,0.3);
}

.menu{
  width:520px;
}

.item{
  display:block;
  position:relative;
  padding:12px 16px 12px 40px;
  font-size:34px;
  color:var(--green);
  text-decoration:none;
  border-top:1px solid var(--green-dim);
  text-shadow:0 0 6px rgba(0,217,79,0.2);
}

.item::before{
  position:absolute;
  left:12px;
  content:" ";
}

.item.active{
  color:var(--amber);
  background:rgba(255,179,71,0.1);
}

.item.active::before{
  content:">";
}

/* フッター */
.footer{
  position:fixed;
  bottom:14px;
  right:14px;
  font-size:18px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="boot" id="boot">
SYSTEM INIT...<br>
LINK CHECK...<br>
NODE ONLINE...
</div>

<div class="boot-line"></div>

<div class="status" id="status">
MODE: STANDBY<br>
LINK: ACTIVE<br>
NODE: J-LAB<br>
SEL : NONE
</div>

<div class="screen">

  <div class="title">J-Lab</div>

  <div class="menu">
    <a class="item" href="https://me45227424v-pixel.github.io/J-Lab.test/" data-mode="TEST" data-node="CLOCK">
      J-Lab.test
    </a>

    <a class="item" href="#" data-mode="INTERCEPT" data-node="TRACK">
      Runaway-Hello
    </a>

    <a class="item" href="#" data-mode="LOG" data-node="STEP">
      Every-Step
    </a>
  </div>

</div>

<div class="footer">SYSTEM READY</div>

<script>
const items=document.querySelectorAll(".item");
const status=document.getElementById("status");
const boot=document.getElementById("boot");

let current=-1;
let ctx;
let activeOscillators=[];
let activeGains=[];

setTimeout(()=>boot.classList.add("hidden"),1200);

/* ステータス */
function setActive(i){
  current=i;
  items.forEach(el=>el.classList.remove("active"));
  items[i].classList.add("active");

  status.innerHTML=
`MODE: ${items[i].dataset.mode}
LINK: ACTIVE
NODE: ${items[i].dataset.node}
SEL : ${items[i].textContent}`;
}

function clearActive(){
  items.forEach(el=>el.classList.remove("active"));
  status.innerHTML=
`MODE: STANDBY
LINK: ACTIVE
NODE: J-LAB
SEL : NONE`;
}

/* 音停止 */
function stopAllBeeps(){
  const now=ctx?ctx.currentTime:0;
  activeGains.forEach(g=>{
    try{g.gain.setValueAtTime(0.0001,now);}catch(e){}
  });
  activeOscillators.forEach(o=>{
    try{o.stop(now);}catch(e){}
  });
  activeOscillators=[];
  activeGains=[];
}

/* ビープ */
function beep(){
  if(!ctx) ctx=new (window.AudioContext||window.webkitAudioContext)();
  if(ctx.state==="suspended") ctx.resume();

  stopAllBeeps();

  const t=ctx.currentTime;

  function tone(f,start){
    const o=ctx.createOscillator();
    const g=ctx.createGain();

    o.type="sine";
    o.frequency.value=f;

    o.connect(g);
    g.connect(ctx.destination);

    g.gain.setValueAtTime(0.001,start);
    g.gain.linearRampToValueAtTime(0.05,start+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,start+0.1);

    o.start(start);
    o.stop(start+0.1);

    activeOscillators.push(o);
    activeGains.push(g);
  }

  // 1セット目
  tone(500,t);
  tone(250,t+0.1);

  // 0.2秒空けて2セット目
  const s2=t+0.2+0.2;
  tone(500,s2);
  tone(250,s2+0.1);
}

/* ポインタ */
items.forEach((el,i)=>{
  el.addEventListener("pointerenter",()=>{setActive(i);beep();});
  el.addEventListener("pointerleave",()=>clearActive());
  el.addEventListener("click",()=>{setActive(i);beep();});
});

/* キーボード */
document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowDown"){
    current=(current+1+items.length)%items.length;
    setActive(current);beep();
  }
  if(e.key==="ArrowUp"){
    current=(current-1+items.length)%items.length;
    setActive(current);beep();
  }
  if(e.key==="Enter"&&current>=0){
    items[current].click();
  }
});
</script>

</body>
</html>
