<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J-Lab</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #00ff66;
  font-family: "Courier New", monospace;
}

.screen {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 16vh;
}

.title {
  font-size: clamp(28px, 6vw, 64px);
  letter-spacing: 0.12em;
  margin-bottom: 40px;
}

/* ステータス */
.status {
  position: absolute;
  top: 10px;
  left: 12px;
  font-size: 12px;
  color: rgba(0,255,100,0.6);
  line-height: 1.6;
}

/* メニュー */
.menu {
  width: 80%;
  max-width: 520px;
}

.item {
  display: block;
  padding: 12px 0;
  border-top: 1px solid rgba(0,255,100,0.25);
  text-decoration: none;
  color: #00ff66;
  font-size: clamp(16px, 4vw, 22px);
}

.item:last-child {
  border-bottom: 1px solid rgba(0,255,100,0.25);
}

/* アクティブ（アンバー） */
.active {
  color: #ffb347;
  background: rgba(255,180,70,0.08);
}

/* 起動ライン */
.line {
  position: absolute;
  top: 0;
  left: 0;
  height: 2px;
  width: 0;
  background: #00ff66;
  animation: scan 1s ease forwards;
}

@keyframes scan {
  to { width: 100%; }
}

.footer {
  position: absolute;
  bottom: 18px;
  font-size: 12px;
  color: rgba(0,255,100,0.4);
}
</style>
</head>

<body>

<div class="line"></div>

<div class="status">
MODE: STANDBY<br>
LINK: ACTIVE<br>
NODE: J-LAB
</div>

<div class="screen">

  <div class="title">J-Lab</div>

  <div class="menu">
    <a class="item active" href="https://me45227424v-pixel.github.io/J-Lab.test/">
      J-Lab.test
    </a>

    <a class="item" href="#">
      Runaway-Hello
    </a>

    <a class="item" href="#">
      Every-Step
    </a>
  </div>

  <div class="footer">SYSTEM READY</div>

</div>

<script>
const items = document.querySelectorAll(".item");
let current = 0;

/* アクティブ更新 */
function updateActive() {
  items.forEach(el => el.classList.remove("active"));
  items[current].classList.add("active");
}

/* 簡易ビープ */
function beep() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.type = "square";
  osc.frequency.value = 800;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(() => osc.stop(), 50);
}

/* キー操作 */
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowDown") {
    current = (current + 1) % items.length;
    updateActive();
    beep();
  }
  if (e.key === "ArrowUp") {
    current = (current - 1 + items.length) % items.length;
    updateActive();
    beep();
  }
  if (e.key === "Enter") {
    items[current].click();
  }
});

/* タップ操作 */
items.forEach((item, index) => {
  item.addEventListener("click", () => {
    current = index;
    updateActive();
    beep();
  });
});
</script>

</body>
</html>
