<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J-Lab Tactical Display</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --green:#00d94f;
  --amber:#ffb347;
}

body{
  margin:0;
  background:#000;
  color:var(--green);
  font-family:"VT323",monospace;
  overflow:hidden;
}

/* スキャン */
.boot{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:28px;
  letter-spacing:0.1em;
}

.screen{
  display:none;
}

/* タイトル */
.title{
  font-family:"Share Tech Mono",monospace;
  font-size:64px;
  margin-bottom:40px;
}

.menu{
  width:520px;
}

.item{
  display:block;
  padding:10px 16px 10px 40px;
  font-size:34px;
  color:var(--green);
  text-decoration:none;
  border-top:1px solid rgba(0,255,100,0.3);
}

.item::before{
  position:absolute;
  left:10px;
}

.item.active{
  color:var(--amber);
}
.item.active::before{
  content:">";
}
</style>
</head>

<body>

<!-- 起動画面 -->
<div class="boot" id="boot">
  OP LOAD COMPLETE<br><br>
  TAP TO CONTINUE
</div>

<!-- 本画面 -->
<div class="screen" id="screen">

  <div style="padding-top:14vh;text-align:center;">
    <div class="title">J-Lab</div>

    <div class="menu">
      <a class="item" href="https://me45227424v-pixel.github.io/J-Lab.test/">J-Lab.test</a>
      <a class="item" href="#">Runaway-Hello</a>
      <a class="item" href="#">Every-Step</a>
    </div>
  </div>

</div>

<script>
let ctx;
let activeOscillators=[];
let activeGains=[];

function stopAllBeeps(){
  if(!ctx) return;
  activeOscillators.forEach(o=>{try{o.stop();}catch(e){}});
  activeOscillators=[];
  activeGains=[];
}

function beep(){
  if(!ctx){
    ctx=new (window.AudioContext||window.webkitAudioContext)();
  }

  if(ctx.state==="suspended"){
    ctx.resume();
  }

  stopAllBeeps();

  const t=ctx.currentTime;

  function tone(f,start){
    const o=ctx.createOscillator();
    const g=ctx.createGain();

    o.type="sine";
    o.frequency.value=f;

    o.connect(g);
    g.connect(ctx.destination);

    g.gain.setValueAtTime(0.001,start);
    g.gain.linearRampToValueAtTime(0.05,start+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,start+0.1);

    o.start(start);
    o.stop(start+0.1);

    activeOscillators.push(o);
    activeGains.push(g);
  }

  // 4回（2セット×2）
  const gap=0.4;

  for(let i=0;i<4;i++){
    let base=t+(i*gap);
    tone(500,base);
    tone(250,base+0.1);
  }
}

/* タップで遷移 */
document.getElementById("boot").addEventListener("click",()=>{
  beep();

  setTimeout(()=>{
    document.getElementById("boot").style.display="none";
    document.getElementById("screen").style.display="block";
  },800);
});
</script>

</body>
</html>
