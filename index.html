<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J-Lab Tactical Display</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>
:root{
  --font-main:48px;
  --green:#00d94f;
  --green-dim:rgba(0,217,79,0.30);
  --amber:#ffb347;
  --amber-bg:rgba(255,179,71,0.10);
}

body{
  margin:0;
  background:#000;
  color:var(--green);
  font-family:"VT323", monospace;
  overflow:hidden;
}

/* ノイズ */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(0,217,79,0.018) 0px,
    rgba(0,217,79,0.018) 1px,
    transparent 1px,
    transparent 3px
  );
}

/* BOOT */
.boot{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:var(--font-main);
  cursor:pointer;
}

.boot.hidden{
  display:none;
}

/* 左上時刻 */
.datetime{
  position:fixed;
  top:12px;
  left:14px;
  font-size:var(--font-main);
}

/* メイン */
.screen{
  display:none;
  flex-direction:column;
  align-items:center;
  padding-top:14vh;
}

.screen.visible{
  display:flex;
}

/* タイトル */
.title{
  font-size:var(--font-main);
  margin-bottom:40px;
}

/* メニュー */
.menu{
  width:70%;
  max-width:700px;
}

.item{
  display:block;
  font-size:var(--font-main);
  text-align:center;
  padding:12px;
  border-top:1px solid var(--green-dim);
  text-decoration:none;
  color:var(--green);
  position:relative;
}

.item:last-child{
  border-bottom:1px solid var(--green-dim);
}

.item.active{
  color:var(--amber);
  background:var(--amber-bg);
}

.item.active::before{
  content:">";
  position:absolute;
  left:10px;
}

/* フッター */
.footer{
  position:fixed;
  bottom:10px;
  right:10px;
  font-size:var(--font-main);
  opacity:0.6;
}
</style>
</head>

<body>

<div class="boot" id="boot">
  OP LOAD COMPLETE<br><br>
  TAP TO CONTINUE
</div>

<div class="datetime" id="datetime"></div>

<div class="screen" id="screen">

  <div class="title">J-Lab</div>

  <div class="menu">
    <a class="item" href="#">Anti-Air Warfare</a>
    <a class="item" href="#">Surface Warfare</a>
    <a class="item" href="#">Undersea Warfare</a>
  </div>

</div>

<div class="footer">SYSTEM READY</div>

<script>
const boot = document.getElementById("boot");
const screen = document.getElementById("screen");
const items = document.querySelectorAll(".item");
const datetimeEl = document.getElementById("datetime");

let current = -1;

/* 時計 */
function pad(n){return String(n).padStart(2,"0");}

function updateTime(){
  const d = new Date();
  datetimeEl.textContent =
    d.getFullYear()+" "+
    pad(d.getMonth()+1)+" "+
    pad(d.getDate())+" "+
    pad(d.getHours())+" "+
    pad(d.getMinutes())+" "+
    pad(d.getSeconds());
}
setInterval(updateTime,1000);
updateTime();

/* 起動 */
boot.addEventListener("click",()=>{
  boot.classList.add("hidden");
  screen.classList.add("visible");
});

/* 選択 */
function setActive(i){
  current=i;
  items.forEach(el=>el.classList.remove("active"));
  items[i].classList.add("active");
}

items.forEach((el,i)=>{
  el.addEventListener("pointerenter",()=>setActive(i));
});
</script>

</body>
</html>
