<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>J-Lab Tactical Display</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>
:root{
  --font-main: clamp(24px, 4.8vw, 48px);
  --font-title: clamp(34px, 7vw, 64px);
  --green:#00d94f;
  --green-dim:rgba(0,217,79,0.30);
  --amber:#ffb347;
  --amber-bg:rgba(255,179,71,0.10);
  --side-pad:max(12px, env(safe-area-inset-left));
  --top-pad:max(12px, env(safe-area-inset-top));
  --bottom-pad:max(10px, env(safe-area-inset-bottom));
}

*{
  box-sizing:border-box;
}

html, body{
  width:100%;
  height:100%;
}

body{
  margin:0;
  background:#000;
  color:var(--green);
  font-family:"VT323", monospace;
  overflow:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(0,217,79,0.018) 0px,
    rgba(0,217,79,0.018) 1px,
    transparent 1px,
    transparent 3px
  );
}

.boot{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:var(--font-main);
  line-height:1.15;
  cursor:pointer;
  user-select:none;
  padding:24px;
}

.boot.hidden{
  display:none;
}

.datetime{
  position:fixed;
  top:calc(var(--top-pad) + 2px);
  left:calc(var(--side-pad) + 2px);
  right:calc(var(--side-pad) + 2px);
  font-size:var(--font-main);
  user-select:none;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.screen{
  display:none;
  min-height:100dvh;
  width:100%;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:
    calc(var(--top-pad) + 80px)
    max(16px, env(safe-area-inset-right))
    calc(var(--bottom-pad) + 60px)
    max(16px, env(safe-area-inset-left));
}

.screen.visible{
  display:flex;
}

.title{
  font-size:var(--font-title);
  line-height:1;
  margin-bottom:28px;
  text-align:center;
}

.menu{
  width:min(92vw, 700px);
}

.item{
  display:block;
  width:100%;
  font-size:var(--font-main);
  line-height:1.1;
  text-align:center;
  padding:14px 36px;
  border-top:1px solid var(--green-dim);
  text-decoration:none;
  color:var(--green);
  position:relative;
  cursor:pointer;
  user-select:none;
  word-break:break-word;
  -webkit-tap-highlight-color:transparent;
}

.item:last-child{
  border-bottom:1px solid var(--green-dim);
}

.item.active{
  color:var(--amber);
  background:var(--amber-bg);
}

.item.active::before{
  content:">";
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
}

.footer{
  position:fixed;
  bottom:calc(var(--bottom-pad) + 2px);
  right:calc(max(10px, env(safe-area-inset-right)) + 2px);
  left:calc(max(10px, env(safe-area-inset-left)) + 2px);
  font-size:var(--font-main);
  opacity:1;
  user-select:none;
  text-align:right;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* 小型スマホ向け追加調整 */
@media (max-width: 480px){
  .datetime{
    font-size:clamp(20px, 4.3vw, 28px);
  }

  .footer{
    font-size:clamp(20px, 4.3vw, 28px);
  }

  .item{
    padding:12px 28px;
  }

  .item.active::before{
    left:8px;
  }
}

/* 横向きで高さが低い端末向け */
@media (max-height: 500px){
  .screen{
    justify-content:flex-start;
    padding-top:90px;
  }

  .title{
    margin-bottom:18px;
  }

  .item{
    padding-top:10px;
    padding-bottom:10px;
  }
}
</style>
</head>

<body>

<div class="boot" id="boot">
  OP LOAD COMPLETE<br><br>
  CLICK / TAP TO CONTINUE
</div>

<div class="datetime" id="datetime"></div>

<div class="screen" id="screen">
  <div class="title">J-Lab</div>

  <div class="menu">
    <a class="item" href="aaw.html">Anti-Air Warfare</a>
    <a class="item" href="suw.html">Surface Warfare</a>
    <a class="item" href="usw.html">Undersea Warfare</a>
  </div>
</div>

<div class="footer">SYSTEM READY</div>

<script>
const boot = document.getElementById("boot");
const screen = document.getElementById("screen");
const items = document.querySelectorAll(".item");
const datetimeEl = document.getElementById("datetime");

let current = -1;
let isNavigating = false;

/* ===== 時計 ===== */
function pad(n){ return String(n).padStart(2, "0"); }

function updateTime(){
  const d = new Date();
  datetimeEl.textContent =
    d.getFullYear() + " " +
    pad(d.getMonth() + 1) + " " +
    pad(d.getDate()) + " " +
    pad(d.getHours()) + " " +
    pad(d.getMinutes()) + " " +
    pad(d.getSeconds());
}
setInterval(updateTime, 1000);
updateTime();

/* ===== 音 ===== */
let ctx;
let activeOscillators = [];

function ensureAudioContext(){
  if(!ctx){
    ctx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return ctx;
}

function stopAll(){
  if(!ctx) return;
  activeOscillators.forEach(o => {
    try { o.stop(); } catch(e){}
  });
  activeOscillators = [];
}

function tone(freq, start, d){
  const audio = ensureAudioContext();
  const o = audio.createOscillator();
  const g = audio.createGain();

  o.type = "sine";
  o.frequency.value = freq;

  o.connect(g);
  g.connect(audio.destination);

  g.gain.setValueAtTime(0.001, start);
  g.gain.linearRampToValueAtTime(0.05, start + 0.01);
  g.gain.setValueAtTime(0.05, start + d - 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, start + d);

  o.start(start);
  o.stop(start + d);

  activeOscillators.push(o);
}

function playConfirmBeep(){
  const audio = ensureAudioContext();

  const start = () => {
    stopAll();

    const t = ctx.currentTime;
    const d = 0.1;
    const setLength = 1.1;

    for(let i = 0; i < 2; i++){
      const base = t + (i * setLength);

      tone(500, base, d);
      tone(250, base + 0.1, d);

      tone(500, base + 0.4, d);
      tone(250, base + 0.5, d);
    }
  };

  if(audio.state === "suspended"){
    audio.resume().then(start);
  } else {
    start();
  }
}

/* ===== 起動 ===== */
function enterMainScreen(){
  if(isNavigating) return;
  boot.classList.add("hidden");
  screen.classList.add("visible");
  playConfirmBeep();
}

boot.addEventListener("click", enterMainScreen);

/* ===== 選択 ===== */
function setActive(i){
  current = i;
  items.forEach(el => el.classList.remove("active"));
  items[i].classList.add("active");
}

function navigateWithBeep(i){
  if(isNavigating) return;
  isNavigating = true;

  setActive(i);
  playConfirmBeep();

  const url = items[i].getAttribute("href");

  setTimeout(() => {
    window.location.href = url;
  }, 2300);
}

items.forEach((el, i) => {
  el.addEventListener("pointerenter", () => setActive(i));
  el.addEventListener("mouseenter", () => setActive(i));

  el.addEventListener("click", (e) => {
    e.preventDefault();
    navigateWithBeep(i);
  });
});

/* ===== キーボード ===== */
document.addEventListener("keydown", (e) => {
  if(!screen.classList.contains("visible")) return;
  if(isNavigating) return;

  if(e.key === "ArrowDown"){
    current = (current + 1 + items.length) % items.length;
    setActive(current);
  }

  if(e.key === "ArrowUp"){
    current = (current - 1 + items.length) % items.length;
    setActive(current);
  }

  if(e.key === "Enter" && current >= 0){
    navigateWithBeep(current);
  }
});
</script>

</body>
</html>
