<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J-Lab Tactical Display</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000000;
  --green:#00d94f;
  --green-dim:rgba(0,217,79,0.30);
  --green-glow:rgba(0,217,79,0.28);
  --amber:#ffb347;
  --amber-dim:rgba(255,179,71,0.22);
  --amber-bg:rgba(255,179,71,0.10);
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  width:100%;
  min-height:100%;
  background:#000;
  color:var(--green);
  overflow:hidden;
  font-family:"VT323", monospace;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(0,217,79,0.020) 0px,
    rgba(0,217,79,0.020) 1px,
    transparent 1px,
    transparent 3px
  );
}

.boot-line{
  position:fixed;
  top:0;
  left:0;
  width:0;
  height:2px;
  background:var(--green);
  box-shadow:0 0 6px var(--green-glow);
  animation:scan 0.8s ease forwards;
  z-index:4;
}

@keyframes scan{
  to{ width:100%; }
}

.boot{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  color:var(--green);
  text-align:center;
  font-size:24px;
  line-height:1.4;
  letter-spacing:0.06em;
  text-shadow:
    0 0 4px rgba(0,217,79,0.35),
    0 0 10px rgba(0,217,79,0.12);
  z-index:10;
  opacity:1;
  visibility:visible;
  transition:opacity 0.35s ease, visibility 0.35s ease;
}

.boot.hidden{
  opacity:0;
  visibility:hidden;
}

.status{
  position:fixed;
  top:12px;
  left:14px;
  z-index:3;
  font-size:20px;
  line-height:1.08;
  letter-spacing:0.04em;
  text-shadow:
    0 0 4px rgba(0,217,79,0.32),
    0 0 10px rgba(0,217,79,0.10);
}

.screen{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:14vh;
}

.title{
  margin:0 0 36px 0;
  font-family:"Share Tech Mono", monospace;
  font-size:72px;
  letter-spacing:0.15em;
  text-transform:uppercase;
  text-shadow:
    0 0 5px rgba(0,217,79,0.40),
    0 0 12px rgba(0,217,79,0.14);
}

.menu{
  width:520px;
  max-width:84vw;
}

.item{
  position:relative;
  display:block;
  padding:12px 16px 12px 42px;
  font-size:34px;
  line-height:1.05;
  color:var(--green);
  text-decoration:none;
  border-top:1px solid var(--green-dim);
  text-shadow:
    0 0 4px rgba(0,217,79,0.26),
    0 0 8px rgba(0,217,79,0.10);
  user-select:none;
  transition:
    color 0.08s linear,
    background-color 0.08s linear,
    border-color 0.08s linear,
    text-shadow 0.08s linear;
}

.item:last-child{
  border-bottom:1px solid var(--green-dim);
}

.item::before{
  content:" ";
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
}

.item.active{
  color:var(--amber);
  background:var(--amber-bg);
  border-top-color:var(--amber-dim);
  text-shadow:
    0 0 4px rgba(255,179,71,0.40),
    0 0 10px rgba(255,179,71,0.16);
}

.item.active::before{
  content:">";
}

.footer{
  position:fixed;
  right:14px;
  bottom:14px;
  font-size:18px;
  opacity:0.78;
  text-shadow:0 0 4px rgba(0,217,79,0.20);
}
</style>
</head>
<body>

<div class="boot" id="boot">
  SYSTEM INIT...<br>
  LINK CHECK...<br>
  NODE ONLINE...
</div>

<div class="boot-line"></div>

<div class="status" id="status">
MODE: STANDBY<br>
LINK: ACTIVE<br>
NODE: J-LAB<br>
SEL : NONE
</div>

<div class="screen">
  <div class="title">J-Lab</div>

  <div class="menu">
    <a class="item" href="https://me45227424v-pixel.github.io/J-Lab.test/" data-mode="TEST" data-node="CLOCK">
      J-Lab.test
    </a>

    <a class="item" href="#" data-mode="INTERCEPT" data-node="TRACK">
      Runaway-Hello
    </a>

    <a class="item" href="#" data-mode="LOG" data-node="STEP">
      Every-Step
    </a>
  </div>
</div>

<div class="footer">SYSTEM READY</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const items = document.querySelectorAll(".item");
  const status = document.getElementById("status");
  const boot = document.getElementById("boot");

  let current = -1;
  let ctx = null;
  let activeOscillators = [];
  let activeGains = [];

  function setActive(i) {
    current = i;
    items.forEach(el => el.classList.remove("active"));
    items[i].classList.add("active");

    status.innerHTML =
      "MODE: " + items[i].dataset.mode + "<br>" +
      "LINK: ACTIVE<br>" +
      "NODE: " + items[i].dataset.node + "<br>" +
      "SEL : " + items[i].textContent.trim();
  }

  function clearActive() {
    items.forEach(el => el.classList.remove("active"));
    status.innerHTML =
      "MODE: STANDBY<br>" +
      "LINK: ACTIVE<br>" +
      "NODE: J-LAB<br>" +
      "SEL : NONE";
  }

  function ensureAudioContext() {
    if (!ctx) {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return null;
      ctx = new AudioCtx();
    }
    if (ctx.state === "suspended") {
      ctx.resume();
    }
    return ctx;
  }

  function stopAllBeeps() {
    if (!ctx) return;

    const now = ctx.currentTime;

    activeGains.forEach(g => {
      try {
        g.gain.cancelScheduledValues(now);
        g.gain.setValueAtTime(0.0001, now);
      } catch (e) {}
    });

    activeOscillators.forEach(o => {
      try {
        o.stop(now);
      } catch (e) {}
    });

    activeOscillators = [];
    activeGains = [];
  }

  function tone(freq, start, duration) {
    const audio = ensureAudioContext();
    if (!audio) return;

    const o = audio.createOscillator();
    const g = audio.createGain();

    o.type = "sine";
    o.frequency.setValueAtTime(freq, start);

    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(0.05, start + 0.01);
    g.gain.setValueAtTime(0.05, start + duration - 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, start + duration);

    o.connect(g);
    g.connect(audio.destination);

    o.start(start);
    o.stop(start + duration);

    activeOscillators.push(o);
    activeGains.push(g);

    o.onended = () => {
      activeOscillators = activeOscillators.filter(x => x !== o);
      activeGains = activeGains.filter(x => x !== g);
    };
  }

  function playBootBeepPattern() {
    const audio = ensureAudioContext();
    if (!audio) return;

    stopAllBeeps();

    const t = audio.currentTime;
    const toneDuration = 0.1;
    const gapInsideSet = 0.0;
    const gapBetweenSets = 0.2;

    // 1セットの長さ:
    // 500Hz 0.1s + 250Hz 0.1s = 0.2s
    // その後 0.2s 空白
    // => 次セット開始まで 0.4s
    const setStartGap = 0.4;

    // 2セット × 2ループ = 合計4セット
    for (let loop = 0; loop < 4; loop++) {
      const base = t + (loop * setStartGap);
      tone(500, base, toneDuration);
      tone(250, base + toneDuration + gapInsideSet, toneDuration);
    }
  }

  items.forEach((el, i) => {
    el.addEventListener("pointerenter", () => {
      setActive(i);
    });

    el.addEventListener("pointerleave", () => {
      clearActive();
    });

    el.addEventListener("focus", () => {
      setActive(i);
    });

    el.addEventListener("blur", () => {
      clearActive();
    });

    // クリック時ビープは廃止
    el.addEventListener("click", () => {
      setActive(i);
    });
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowDown") {
      current = (current + 1 + items.length) % items.length;
      setActive(current);
    }

    if (e.key === "ArrowUp") {
      current = (current - 1 + items.length) % items.length;
      setActive(current);
    }

    if (e.key === "Enter" && current >= 0) {
      items[current].click();
    }
  });

  // 起動シーケンス後にビープ
  setTimeout(() => {
    boot.classList.add("hidden");
    playBootBeepPattern();
  }, 1200);
});
</script>

</body>
</html>
