<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J-Lab Tactical Display</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000000;
      --green: #00d94f;
      --green-dim: rgba(0, 217, 79, 0.32);
      --green-soft: rgba(0, 217, 79, 0.08);
      --green-faint: rgba(0, 217, 79, 0.16);
      --amber: #ffb347;
      --amber-dim: rgba(255, 179, 71, 0.28);
      --amber-soft: rgba(255, 179, 71, 0.10);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--green);
      overflow: hidden;
      font-family: "VT323", monospace;
    }

    body {
      position: relative;
    }

    /* 画面全体のごく弱い走査感 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(0, 217, 79, 0.028) 0px,
          rgba(0, 217, 79, 0.028) 1px,
          transparent 1px,
          transparent 3px
        );
      opacity: 0.55;
      mix-blend-mode: screen;
    }

    /* 上部ブートライン */
    .boot-line {
      position: fixed;
      top: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--green);
      box-shadow: 0 0 3px rgba(0, 217, 79, 0.45);
      animation: scan 0.9s ease-out forwards;
      z-index: 5;
    }

    @keyframes scan {
      to { width: 100%; }
    }

    /* 左上情報 */
    .status-block {
      position: fixed;
      top: 12px;
      left: 14px;
      z-index: 3;
      font-size: clamp(16px, 1.5vw, 22px);
      line-height: 1.06;
      letter-spacing: 0.03em;
      color: var(--green);
      user-select: none;
      opacity: 0.95;
    }

    .status-block .line {
      margin-bottom: 3px;
    }

    /* 全体レイアウト */
    .screen {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto 1fr;
      justify-items: center;
      align-items: center;
      padding: 0 4vw;
      position: relative;
      z-index: 2;
    }

    .center-zone {
      grid-row: 2;
      width: min(780px, 82vw);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* タイトル */
    .title {
      margin: 0 0 38px 0;
      font-family: "Share Tech Mono", monospace;
      font-size: clamp(44px, 6.2vw, 86px);
      line-height: 1;
      letter-spacing: 0.16em;
      color: var(--green);
      font-weight: 400;
      user-select: none;
      text-transform: uppercase;
    }

    /* メニュー */
    .menu {
      width: 100%;
      position: relative;
    }

    .menu::before,
    .menu::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--green-faint);
      pointer-events: none;
    }

    .menu::before {
      top: 0;
    }

    .menu::after {
      bottom: 0;
    }

    .item {
      position: relative;
      display: block;
      width: 100%;
      padding: 12px 16px 11px;
      text-decoration: none;
      color: var(--green);
      font-size: clamp(28px, 3vw, 42px);
      line-height: 1.05;
      letter-spacing: 0.03em;
      border-top: 1px solid var(--green-faint);
      background: transparent;
      transition:
        color 0.08s linear,
        background-color 0.08s linear,
        border-color 0.08s linear;
      cursor: pointer;
      user-select: none;
    }

    .item:first-child {
      border-top: none;
    }

    .item::before {
      content: "";
      position: absolute;
      inset: 0;
      border-left: 1px solid transparent;
      border-right: 1px solid transparent;
      pointer-events: none;
      transition: border-color 0.08s linear;
    }

    .item.active {
      color: var(--amber);
      background: var(--amber-soft);
      border-top-color: var(--amber-dim);
    }

    .item.active::before {
      border-left-color: var(--amber-dim);
      border-right-color: var(--amber-dim);
    }

    .item.active + .item {
      border-top-color: var(--amber-dim);
    }

    /* 右下システム表示 */
    .system-readout {
      position: fixed;
      right: 14px;
      bottom: 14px;
      text-align: right;
      font-size: clamp(16px, 1.4vw, 20px);
      line-height: 1.05;
      letter-spacing: 0.03em;
      color: rgba(0, 217, 79, 0.72);
      user-select: none;
      z-index: 3;
    }

    .system-readout .ready {
      margin-top: 8px;
      color: rgba(0, 217, 79, 0.9);
    }

    /* 左下の小さな注記 */
    .command-line {
      position: fixed;
      left: 14px;
      bottom: 14px;
      font-size: clamp(16px, 1.35vw, 20px);
      line-height: 1.05;
      letter-spacing: 0.03em;
      color: rgba(0, 217, 79, 0.72);
      user-select: none;
      z-index: 3;
    }

    /* モバイル向け微調整 */
    @media (max-width: 900px) {
      .center-zone {
        width: min(640px, 86vw);
      }

      .item {
        padding: 14px 14px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="boot-line"></div>

  <div class="status-block" id="statusBlock">
    <div class="line">MODE: STANDBY</div>
    <div class="line">LINK: ACTIVE</div>
    <div class="line">NODE: J-LAB</div>
    <div class="line" id="statusSelection">SEL : NONE</div>
  </div>

  <main class="screen">
    <section class="center-zone">
      <h1 class="title">J-Lab</h1>

      <nav class="menu" aria-label="J-Lab repository menu">
        <a
          class="item"
          href="https://me45227424v-pixel.github.io/J-Lab.test/"
          data-label="J-LAB.TEST"
        >
          J-Lab.test
        </a>

        <a
          class="item"
          href="#"
          data-label="RUNAWAY-HELLO"
        >
          Runaway-Hello
        </a>

        <a
          class="item"
          href="#"
          data-label="EVERY-STEP"
        >
          Every-Step
        </a>
      </nav>
    </section>
  </main>

  <div class="command-line" id="commandLine">
    COMMAND: IDLE
  </div>

  <div class="system-readout">
    DISP: MPD STYLE<br>
    AUDIO: ENABLED<br>
    INPUT: POINTER / TOUCH
    <div class="ready">SYSTEM READY</div>
  </div>

  <script>
    const items = Array.from(document.querySelectorAll(".item"));
    const statusSelection = document.getElementById("statusSelection");
    const commandLine = document.getElementById("commandLine");

    let activeIndex = -1;
    let audioCtx = null;

    function setStatus(label) {
      statusSelection.textContent = `SEL : ${label}`;
      commandLine.textContent = `COMMAND: ${label}`;
    }

    function setActive(index) {
      activeIndex = index;
      items.forEach((item, i) => {
        item.classList.toggle("active", i === index);
      });

      if (index >= 0) {
        setStatus(items[index].dataset.label || "UNKNOWN");
      } else {
        setStatus("NONE");
      }
    }

    function clearActive() {
      activeIndex = -1;
      items.forEach((item) => item.classList.remove("active"));
      setStatus("NONE");
    }

    function getAudioContext() {
      if (!audioCtx) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (AudioContextClass) {
          audioCtx = new AudioContextClass();
        }
      }
      return audioCtx;
    }

    function playSelectionTone() {
      const ctx = getAudioContext();
      if (!ctx) return;

      if (ctx.state === "suspended") {
        ctx.resume();
      }

      const now = ctx.currentTime;

      function createTone(freq, startTime, duration) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "sine";
        osc.frequency.setValueAtTime(freq, startTime);

        gain.gain.setValueAtTime(0.0001, startTime);
        gain.gain.linearRampToValueAtTime(0.045, startTime + 0.02);
        gain.gain.setValueAtTime(0.045, startTime + duration - 0.025);
        gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start(startTime);
        osc.stop(startTime + duration);
      }

      createTone(400, now, 0.2);
      createTone(250, now + 0.2, 0.2);
    }

    items.forEach((item, index) => {
      item.addEventListener("pointerenter", (event) => {
        setActive(index);

        if (event.pointerType === "mouse" || event.pointerType === "pen") {
          playSelectionTone();
        }
      });

      item.addEventListener("pointerleave", () => {
        if (activeIndex === index) {
          clearActive();
        }
      });

      item.addEventListener("focus", () => {
        setActive(index);
      });

      item.addEventListener("blur", () => {
        if (activeIndex === index) {
          clearActive();
        }
      });

      item.addEventListener("click", () => {
        setActive(index);
        playSelectionTone();
      });
    });

    document.addEventListener("keydown", (event) => {
      if (!items.length) return;

      if (event.key === "ArrowDown") {
        event.preventDefault();
        const next = activeIndex < 0 ? 0 : (activeIndex + 1) % items.length;
        setActive(next);
        playSelectionTone();
      }

      if (event.key === "ArrowUp") {
        event.preventDefault();
        const next = activeIndex < 0 ? items.length - 1 : (activeIndex - 1 + items.length) % items.length;
        setActive(next);
        playSelectionTone();
      }

      if (event.key === "Enter" && activeIndex >= 0) {
        items[activeIndex].click();
      }
    });

    clearActive();
  </script>
</body>
</html>
