<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CIWS City Defense</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #000;
      height: 100%;
    }

    canvas {
      display: block;
      background: #000;
      touch-action: none;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  let w = 0;
  let h = 0;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    generateCity();
    crosshair.x = w * 0.5;
    crosshair.y = h * 0.78;
  }
  window.addEventListener("resize", resize);

  const state = {
    score: 1510,
    damage: 39,
    firing: false,
    gameOver: false,
    frame: 0
  };

  const colors = {
    uiGreen: "#36ff8f",
    uiAmber: "#ffb347",
    uiRed: "#ff5a5a",
    star: "#d8d8d8",
    bullet: "#d7ffcf",
    missile: "#f2f2f2",
    drone: "#d0d0d0",
    cityWindow: "#efe89a"
  };

  const crosshair = {
    x: 0,
    y: 0
  };

  const turret = {
    x: 0,
    y: 0
  };

  const bullets = [];
  const threats = [];
  const explosions = [];
  const stars = [];
  const city = [];

  let fireCooldown = 0;

  function rand(min, max) {
    return Math.random() * (max - min) + min;
  }

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function setupStars() {
    stars.length = 0;
    const count = Math.floor((w * h) / 9000);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() < 0.93 ? rand(0.7, 1.6) : rand(1.8, 2.6),
        a: rand(0.4, 0.95)
      });
    }
  }

  function generateCity() {
    city.length = 0;
    const groundY = h - 95;
    let x = 0;

    while (x < w) {
      const width = rand(18, 52);
      const height = rand(50, 170);
      const gray = Math.floor(rand(38, 92));
      const building = {
        x,
        y: groundY - height,
        w: width,
        h: height,
        color: `rgb(${gray},${gray},${gray})`,
        windows: []
      };

      const cols = Math.max(1, Math.floor((width - 6) / 8));
      const rows = Math.max(2, Math.floor((height - 8) / 10));
      const density = rand(0.35, 0.82);

      for (let cy = 0; cy < rows; cy++) {
        for (let cx = 0; cx < cols; cx++) {
          if (Math.random() < density) {
            building.windows.push({
              x: 4 + cx * 8,
              y: 4 + cy * 10,
              lit: Math.random() < rand(0.55, 0.92)
            });
          }
        }
      }

      city.push(building);
      x += width + rand(3, 12);
    }
  }

  function spawnThreat() {
    const type = Math.random() < 0.55 ? "drone" : "missile";
    const side = Math.random();

    let x;
    let y;

    if (side < 0.25) {
      x = rand(-80, w * 0.15);
      y = rand(-40, h * 0.28);
    } else if (side < 0.5) {
      x = rand(w * 0.85, w + 80);
      y = rand(-40, h * 0.28);
    } else {
      x = rand(0, w);
      y = rand(-80, -20);
    }

    const targetX = rand(w * 0.08, w * 0.92);
    const targetY = h - rand(35, 85);

    const dx = targetX - x;
    const dy = targetY - y;
    const len = Math.hypot(dx, dy) || 1;

    let baseSpeed;
    if (type === "drone") {
      baseSpeed = rand(0.55, 0.85);
    } else {
      baseSpeed = rand(1.1, 1.55);
    }

    const speed = baseSpeed * rand(1.5, 2.0);

    threats.push({
      type,
      x,
      y,
      vx: (dx / len) * speed,
      vy: (dy / len) * speed,
      angle: Math.atan2(dy, dx),
      hp: type === "drone" ? 2 : 1,
      wobbleSeed: Math.random() * Math.PI * 2,
      wobbleAmp: type === "drone" ? rand(0.12, 0.35) : 0,
      dead: false
    });
  }

  function fireBullet() {
    const muzzleX = turret.x;
    const muzzleY = turret.y;
    const dx = crosshair.x - muzzleX;
    const dy = crosshair.y - muzzleY;
    const len = Math.hypot(dx, dy) || 1;

    // 垂直上方へ撃った場合、画面上部到達までだいたい3秒前後
    const bulletSpeed = 6.4;

    bullets.push({
      x: muzzleX,
      y: muzzleY,
      vx: (dx / len) * bulletSpeed,
      vy: (dy / len) * bulletSpeed,
      life: 180
    });
  }

  function addExplosion(x, y, color = "#ffffff") {
    explosions.push({
      x, y,
      color,
      life: 22,
      maxLife: 22,
      size: rand(10, 20)
    });
  }

  function update() {
    if (state.gameOver) return;

    state.frame++;
    turret.x = w * 0.5;
    turret.y = h - 32;

    if (state.frame % 42 === 0 && threats.length < 18) {
      spawnThreat();
    }

    if (state.firing) {
      fireCooldown--;
      if (fireCooldown <= 0) {
        fireBullet();
        fireCooldown = 3;
      }
    } else {
      fireCooldown = 0;
    }

    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx;
      b.y += b.vy;
      b.life--;

      if (b.life <= 0 || b.x < -20 || b.x > w + 20 || b.y < -20 || b.y > h + 20) {
        bullets.splice(i, 1);
      }
    }

    for (let i = threats.length - 1; i >= 0; i--) {
      const t = threats[i];

      if (t.type === "drone") {
        const nx = -t.vy;
        const ny = t.vx;
        const nLen = Math.hypot(nx, ny) || 1;
        const wobble = Math.sin(state.frame * 0.04 + t.wobbleSeed) * t.wobbleAmp;
        t.x += t.vx + (nx / nLen) * wobble;
        t.y += t.vy + (ny / nLen) * wobble;
      } else {
        t.x += t.vx;
        t.y += t.vy;
      }

      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        const hitRadius = t.type === "drone" ? 12 : 10;
        const dist = Math.hypot(t.x - b.x, t.y - b.y);
        if (dist < hitRadius) {
          bullets.splice(j, 1);
          t.hp -= 1;

          if (t.hp <= 0) {
            state.score += t.type === "drone" ? 25 : 15;
            addExplosion(t.x, t.y, t.type === "drone" ? "#d7d7d7" : "#ffffff");
            threats.splice(i, 1);
          } else {
            addExplosion(t.x, t.y, "#c8c8c8");
          }
          break;
        }
      }
    }

    for (let i = threats.length - 1; i >= 0; i--) {
      const t = threats[i];
      if (t.y > h - 85) {
        state.damage = clamp(state.damage + (t.type === "drone" ? 6 : 10), 0, 100);
        addExplosion(t.x, h - 80, "#ff8844");
        threats.splice(i, 1);

        if (state.damage >= 100) {
          state.damage = 100;
          state.gameOver = true;
        }
      }
    }

    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].life--;
      if (explosions[i].life <= 0) explosions.splice(i, 1);
    }
  }

  function drawStars() {
    for (const s of stars) {
      ctx.globalAlpha = s.a;
      ctx.fillStyle = colors.star;
      ctx.fillRect(s.x, s.y, s.r, s.r);
    }
    ctx.globalAlpha = 1;
  }

  function drawCity() {
    for (const b of city) {
      ctx.fillStyle = b.color;
      ctx.fillRect(b.x, b.y, b.w, b.h);

      for (const win of b.windows) {
        ctx.fillStyle = win.lit ? colors.cityWindow : "rgba(18,18,18,0.9)";
        ctx.fillRect(b.x + win.x, b.y + win.y, 5, 7);
      }
    }
  }

  function drawTurret() {
    const x = turret.x;
    const y = turret.y;
    const angle = Math.atan2(crosshair.y - y, crosshair.x - x);

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    ctx.strokeStyle = "#d0d0d0";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(-6, 0);
    ctx.lineTo(20, 0);
    ctx.stroke();

    ctx.fillStyle = "#bcbcbc";
    ctx.beginPath();
    ctx.arc(0, 0, 7, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawCrosshair() {
    const x = crosshair.x;
    const y = crosshair.y;

    ctx.strokeStyle = colors.uiGreen;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(x, y, 9, 0, Math.PI * 2);
    ctx.moveTo(x - 14, y);
    ctx.lineTo(x - 4, y);
    ctx.moveTo(x + 4, y);
    ctx.lineTo(x + 14, y);
    ctx.moveTo(x, y - 14);
    ctx.lineTo(x, y - 4);
    ctx.moveTo(x, y + 4);
    ctx.lineTo(x, y + 14);
    ctx.stroke();
  }

  function drawBullet(b) {
    const angle = Math.atan2(b.vy, b.vx);
    const len = 7;
    const x2 = b.x - Math.cos(angle) * len;
    const y2 = b.y - Math.sin(angle) * len;

    ctx.strokeStyle = colors.bullet;
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  function drawMissile(t) {
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.rotate(t.angle + Math.PI / 2);

    ctx.fillStyle = "#f0f0f0";
    ctx.beginPath();
    ctx.moveTo(0, -12);
    ctx.lineTo(4, -3);
    ctx.lineTo(3, 10);
    ctx.lineTo(0, 14);
    ctx.lineTo(-3, 10);
    ctx.lineTo(-4, -3);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawDrone(t) {
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.rotate(t.angle + Math.PI / 2);

    // シャヘド系の全翼・三角翼っぽいシルエット
    ctx.fillStyle = "#d2d2d2";
    ctx.beginPath();
    ctx.moveTo(0, -13);
    ctx.lineTo(10, 7);
    ctx.lineTo(4, 9);
    ctx.lineTo(1.5, 4);
    ctx.lineTo(0, 5);
    ctx.lineTo(-1.5, 4);
    ctx.lineTo(-4, 9);
    ctx.lineTo(-10, 7);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#bcbcbc";
    ctx.beginPath();
    ctx.moveTo(0, -2);
    ctx.lineTo(1.4, 2);
    ctx.lineTo(-1.4, 2);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawExplosions() {
    for (const e of explosions) {
      const p = e.life / e.maxLife;
      ctx.globalAlpha = p;
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size * (1 - p * 0.35), 0, Math.PI * 2);
      ctx.stroke();

      for (let i = 0; i < 6; i++) {
        const a = (Math.PI * 2 / 6) * i + state.frame * 0.03;
        const r1 = 2;
        const r2 = e.size * (1.2 - p * 0.5);
        ctx.beginPath();
        ctx.moveTo(e.x + Math.cos(a) * r1, e.y + Math.sin(a) * r1);
        ctx.lineTo(e.x + Math.cos(a) * r2, e.y + Math.sin(a) * r2);
        ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;
  }

  function drawUI() {
    ctx.font = 'bold 22px "VT323", monospace';
    ctx.textAlign = "left";
    ctx.textBaseline = "top";

    ctx.fillStyle = colors.uiGreen;
    ctx.fillText("FIRE  : SPACE KEY", w - 245, 26);

    ctx.fillStyle = colors.uiAmber;
    ctx.fillText(`SCORE : ${state.score}`, w - 245, 66);

    ctx.fillStyle = colors.uiRed;
    ctx.fillText(`DAMAGE : ${state.damage}%`, w - 245, 106);

    if (state.gameOver) {
      ctx.fillStyle = "#ff6666";
      ctx.font = 'bold 54px "VT323", monospace';
      ctx.textAlign = "center";
      ctx.fillText("CITY LOST", w * 0.5, h * 0.38);
    }
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    drawStars();
    drawCity();

    for (const t of threats) {
      if (t.type === "drone") drawDrone(t);
      else drawMissile(t);
    }

    for (const b of bullets) {
      drawBullet(b);
    }

    drawExplosions();
    drawTurret();
    drawCrosshair();
    drawUI();
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  function setAim(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    crosshair.x = clamp(clientX - rect.left, 0, w);
    crosshair.y = clamp(clientY - rect.top, 0, h);
  }

  window.addEventListener("mousemove", (e) => {
    setAim(e.clientX, e.clientY);
  });

  window.addEventListener("mousedown", (e) => {
    if (e.button === 0) state.firing = true;
  });

  window.addEventListener("mouseup", () => {
    state.firing = false;
  });

  window.addEventListener("keydown", (e) => {
    if (e.code === "Space") {
      e.preventDefault();
      state.firing = true;
    }
  });

  window.addEventListener("keyup", (e) => {
    if (e.code === "Space") {
      state.firing = false;
    }
  });

  window.addEventListener("touchstart", (e) => {
    state.firing = true;
    const t = e.touches[0];
    setAim(t.clientX, t.clientY);
  }, { passive: false });

  window.addEventListener("touchmove", (e) => {
    const t = e.touches[0];
    setAim(t.clientX, t.clientY);
  }, { passive: false });

  window.addEventListener("touchend", () => {
    state.firing = false;
  });

  resize();
  setupStars();
  loop();
})();
</script>
</body>
</html>
