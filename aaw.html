<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>CIWS City Defense</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      width: 100%;
      height: 100%;
      touch-action: none;
      font-family: "Courier New", monospace;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    let w = window.innerWidth;
    let h = window.innerHeight;
    canvas.width = w;
    canvas.height = h;

    const UI_FONT = `"Courier New", monospace`;
    const SKY_COLOR = "#000000";
    const GROUND_COLOR = "#2f2f2f";
    const UI_GREEN = "#00ff66";
    const UI_RED = "#ff4040";

    const state = {
      score: 0,
      damage: 0,
      gameOver: false,
      pointerX: w * 0.5,
      pointerY: h * 0.35,
      firing: false,
      lastShotAt: 0,
      lastTime: 0,
      missiles: [],
      drones: [],
      bullets: [],
      explosions: [],
      buildings: [],
      stars: [],
      spawnMissileTimer: 0,
      spawnDroneTimer: 0
    };

    const groundY = () => h * 0.95;

    const ciws = {
      get x() { return w * 0.5; },
      get y() { return groundY(); },
      get bodyW() { return Math.max(10, w * 0.012); },
      get bodyH() { return Math.max(28, h * 0.05); },
      turretAngle: -Math.PI / 2
    };

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function resize() {
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = w;
      canvas.height = h;
      generateCity();
      generateStars();
    }

    window.addEventListener("resize", resize);

    function generateStars() {
      state.stars = [];
      const count = Math.floor((w * h) / 12000);
      for (let i = 0; i < count; i++) {
        state.stars.push({
          x: rand(0, w),
          y: rand(0, h * 0.9),
          r: rand(0.5, 1.8),
          a: rand(0.3, 1.0)
        });
      }
    }

    function generateCity() {
      state.buildings = [];
      const count = 100;

      for (let i = 0; i < count; i++) {
        const bw = rand(w * 0.006, w * 0.025);
        const bh = rand(h * 0.02, h * 0.15);
        const bx = rand(0, w - bw);
        const by = groundY() - bh;

        const windows = [];
        const cols = Math.max(1, Math.floor(bw / 7));
        const rows = Math.max(1, Math.floor(bh / 10));

        for (let ry = 0; ry < rows; ry++) {
          for (let cx = 0; cx < cols; cx++) {
            const wx = bx + 2 + cx * (bw / cols);
            const wy = by + 3 + ry * (bh / rows);
            const ww = Math.max(1.5, bw / cols - 3);
            const wh = Math.max(2, bh / rows - 4);

            windows.push({
              x: wx,
              y: wy,
              w: ww,
              h: wh,
              lit: Math.random() < 0.45
            });
          }
        }

        state.buildings.push({
          x: bx,
          y: by,
          w: bw,
          h: bh,
          color: Math.random() < 0.5 ? "#161616" : "#202020",
          windows
        });
      }

      state.buildings.sort((a, b) => (a.y + a.h) - (b.y + b.h));
    }

    function setPointer(x, y) {
      state.pointerX = clamp(x, 0, w);
      state.pointerY = clamp(y, 0, groundY() - 5);
    }

    canvas.addEventListener("mousemove", (e) => {
      const rect = canvas.getBoundingClientRect();
      setPointer(e.clientX - rect.left, e.clientY - rect.top);
    });

    canvas.addEventListener("mousedown", (e) => {
      const rect = canvas.getBoundingClientRect();
      setPointer(e.clientX - rect.left, e.clientY - rect.top);
    });

    canvas.addEventListener("touchstart", (e) => {
      if (e.touches.length > 0) {
        const rect = canvas.getBoundingClientRect();
        setPointer(
          e.touches[0].clientX - rect.left,
          e.touches[0].clientY - rect.top
        );
      }
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener("touchmove", (e) => {
      if (e.touches.length > 0) {
        const rect = canvas.getBoundingClientRect();
        setPointer(
          e.touches[0].clientX - rect.left,
          e.touches[0].clientY - rect.top
        );
      }
      e.preventDefault();
    }, { passive: false });

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        state.firing = true;
        e.preventDefault();
      }
    });

    window.addEventListener("keyup", (e) => {
      if (e.code === "Space") {
        state.firing = false;
        e.preventDefault();
      }
    });

    function createBullet() {
      const sx = ciws.x;
      const sy = ciws.y - ciws.bodyH - 6;

      const dx = state.pointerX - sx;
      const dy = state.pointerY - sy;
      const len = Math.hypot(dx, dy) || 1;

      // ビルの最大高が画面15%なので、それに見合う「速く細い」弾速
      const speed = Math.max(w, h) * 1.05;

      state.bullets.push({
        x: sx,
        y: sy,
        vx: (dx / len) * speed,
        vy: (dy / len) * speed,
        r: Math.max(2, w * 0.0022),
        life: 0.85
      });

      state.score -= 5;
    }

    function spawnMissile() {
      const startX = rand(w * 0.03, w * 0.97);
      const startY = -20;
      const targetX = rand(w * 0.02, w * 0.98);
      const targetY = groundY();

      const dx = targetX - startX;
      const dy = targetY - startY;
      const len = Math.hypot(dx, dy) || 1;
      const speed = rand(h * 0.11, h * 0.16);

      state.missiles.push({
        type: "missile",
        x: startX,
        y: startY,
        vx: (dx / len) * speed,
        vy: (dy / len) * speed,
        angle: Math.atan2(dy, dx),
        length: Math.max(14, w * 0.018),
        width: Math.max(4, w * 0.005)
      });
    }

    function spawnDrone() {
      const fromLeft = Math.random() < 0.5;
      const startX = fromLeft ? -20 : w + 20;
      const startY = rand(h * 0.45, h * 0.82);
      const targetX = rand(w * 0.02, w * 0.98);
      const targetY = groundY();

      const dx = targetX - startX;
      const dy = targetY - startY;
      const len = Math.hypot(dx, dy) || 1;
      const speed = rand(h * 0.045, h * 0.075);

      state.drones.push({
        type: "drone",
        x: startX,
        y: startY,
        vx: (dx / len) * speed,
        vy: (dy / len) * speed,
        angle: Math.atan2(dy, dx),
        size: Math.max(8, w * 0.012)
      });
    }

    function createExplosion(x, y, radius, colorA, colorB) {
      state.explosions.push({
        x, y,
        t: 0,
        life: 0.45,
        radius,
        colorA,
        colorB
      });
    }

    function hitTarget(target, bullet) {
      const tx = target.x;
      const ty = target.y;
      const r = target.type === "missile" ? target.length * 0.45 : target.size * 0.55;
      const d = Math.hypot(bullet.x - tx, bullet.y - ty);
      return d < r + bullet.r;
    }

    function update(dt, now) {
      if (state.gameOver) return;

      ciws.turretAngle = Math.atan2(
        state.pointerY - (ciws.y - ciws.bodyH - 6),
        state.pointerX - ciws.x
      );

      if (state.firing && now - state.lastShotAt > 100) {
        createBullet();
        state.lastShotAt = now;
      }

      state.spawnMissileTimer -= dt;
      state.spawnDroneTimer -= dt;

      if (state.spawnMissileTimer <= 0) {
        spawnMissile();
        state.spawnMissileTimer = rand(0.6, 1.2);
      }

      if (state.spawnDroneTimer <= 0) {
        spawnDrone();
        state.spawnDroneTimer = rand(1.3, 2.2);
      }

      for (let i = state.bullets.length - 1; i >= 0; i--) {
        const b = state.bullets[i];
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.life -= dt;

        if (b.x < -20 || b.x > w + 20 || b.y < -20 || b.y > h + 20 || b.life <= 0) {
          state.bullets.splice(i, 1);
        }
      }

      for (let i = state.missiles.length - 1; i >= 0; i--) {
        const m = state.missiles[i];
        m.x += m.vx * dt;
        m.y += m.vy * dt;

        let destroyed = false;

        for (let j = state.bullets.length - 1; j >= 0; j--) {
          if (hitTarget(m, state.bullets[j])) {
            createExplosion(m.x, m.y, Math.max(18, w * 0.025), "#fff2a8", "#ff6a00");
            state.score += 200;
            state.missiles.splice(i, 1);
            state.bullets.splice(j, 1);
            destroyed = true;
            break;
          }
        }

        if (destroyed) continue;

        if (m.y >= groundY()) {
          createExplosion(m.x, groundY() - 4, Math.max(26, w * 0.035), "#ffd27f", "#ff3300");
          state.damage += 8;
          state.missiles.splice(i, 1);
        }
      }

      for (let i = state.drones.length - 1; i >= 0; i--) {
        const d = state.drones[i];
        d.x += d.vx * dt;
        d.y += d.vy * dt;

        let destroyed = false;

        for (let j = state.bullets.length - 1; j >= 0; j--) {
          if (hitTarget(d, state.bullets[j])) {
            createExplosion(d.x, d.y, Math.max(14, w * 0.02), "#f4f4f4", "#ff8844");
            state.score += 150;
            state.drones.splice(i, 1);
            state.bullets.splice(j, 1);
            destroyed = true;
            break;
          }
        }

        if (destroyed) continue;

        if (d.y >= groundY()) {
          createExplosion(d.x, groundY() - 4, Math.max(20, w * 0.028), "#ffe0a6", "#ff5500");
          state.damage += 5;
          state.drones.splice(i, 1);
        }
      }

      for (let i = state.explosions.length - 1; i >= 0; i--) {
        const ex = state.explosions[i];
        ex.t += dt;
        if (ex.t >= ex.life) {
          state.explosions.splice(i, 1);
        }
      }

      state.damage = clamp(state.damage, 0, 100);

      if (state.damage >= 100) {
        state.gameOver = true;
        state.firing = false;
      }
    }

    function drawStars() {
      for (const s of state.stars) {
        ctx.globalAlpha = s.a;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawGround() {
      ctx.fillStyle = GROUND_COLOR;
      ctx.fillRect(0, groundY(), w, h - groundY());

      ctx.strokeStyle = "#555";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, groundY() + 0.5);
      ctx.lineTo(w, groundY() + 0.5);
      ctx.stroke();
    }

    function drawBuildings() {
      for (const b of state.buildings) {
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x, b.y, b.w, b.h);

        for (const win of b.windows) {
          ctx.fillStyle = win.lit ? (Math.random() < 0.03 ? "#ffd080" : "#f7f1a1") : "#0a0a0a";
          ctx.fillRect(win.x, win.y, win.w, win.h);
        }
      }
    }

    function drawCIWS() {
      const baseX = ciws.x;
      const baseY = ciws.y;

      // 本体
      ctx.fillStyle = "#c0c0c0";
      ctx.fillRect(
        baseX - ciws.bodyW / 2,
        baseY - ciws.bodyH,
        ciws.bodyW,
        ciws.bodyH
      );

      // ドーム
      ctx.beginPath();
      ctx.fillStyle = "#d8d8d8";
      ctx.arc(baseX, baseY - ciws.bodyH, ciws.bodyW * 0.75, Math.PI, 0);
      ctx.closePath();
      ctx.fill();

      // 銃身
      ctx.save();
      ctx.translate(baseX, baseY - ciws.bodyH + 2);
      ctx.rotate(ciws.turretAngle);
      ctx.fillStyle = "#eeeeee";
      ctx.fillRect(0, -2, Math.max(16, w * 0.025), 4);
      ctx.restore();
    }

    function drawBullets() {
      for (const b of state.bullets) {
        // 外側
        const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r * 2.2);
        grad.addColorStop(0, "#ff5555");
        grad.addColorStop(0.5, "#ff2f6d");
        grad.addColorStop(1, "rgba(255,0,100,0)");

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r * 2.2, 0, Math.PI * 2);
        ctx.fill();

        // 中心
        ctx.fillStyle = "#ff6666";
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawMissiles() {
      for (const m of state.missiles) {
        ctx.save();
        ctx.translate(m.x, m.y);
        ctx.rotate(m.angle);

        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.moveTo(m.length * 0.5, 0);
        ctx.lineTo(m.length * 0.15, -m.width * 0.6);
        ctx.lineTo(-m.length * 0.5, -m.width * 0.6);
        ctx.lineTo(-m.length * 0.5, m.width * 0.6);
        ctx.lineTo(m.length * 0.15, m.width * 0.6);
        ctx.closePath();
        ctx.fill();

        ctx.restore();
      }
    }

    function drawDrones() {
      for (const d of state.drones) {
        ctx.save();
        ctx.translate(d.x, d.y);
        ctx.rotate(d.angle);

        ctx.fillStyle = "#cccccc";
        ctx.fillRect(-d.size * 0.35, -d.size * 0.18, d.size * 0.7, d.size * 0.36);

        ctx.strokeStyle = "#bbbbbb";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(-d.size * 0.65, 0);
        ctx.lineTo(d.size * 0.65, 0);
        ctx.moveTo(-d.size * 0.2, -d.size * 0.35);
        ctx.lineTo(d.size * 0.2, d.size * 0.35);
        ctx.stroke();

        ctx.restore();
      }
    }

    function drawExplosions() {
      for (const ex of state.explosions) {
        const p = ex.t / ex.life;
        const r = ex.radius * (0.3 + p * 1.2);

        const grad = ctx.createRadialGradient(ex.x, ex.y, 0, ex.x, ex.y, r);
        grad.addColorStop(0, ex.colorA);
        grad.addColorStop(0.35, ex.colorB);
        grad.addColorStop(1, "rgba(255,80,0,0)");

        ctx.globalAlpha = 1 - p;
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(ex.x, ex.y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    function drawUI() {
      ctx.textAlign = "left";
      ctx.textBaseline = "top";

      const titleSize = Math.max(16, w * 0.018);
      const subSize = Math.max(14, w * 0.015);

      ctx.font = `bold ${titleSize}px ${UI_FONT}`;
      ctx.fillStyle = UI_GREEN;
      ctx.fillText("FIRE : SPACE KEY", w - 260, 20);
      ctx.fillText(`SCORE : ${state.score}`, w - 260, 20 + titleSize + 8);

      ctx.font = `bold ${subSize}px ${UI_FONT}`;
      ctx.fillStyle = UI_RED;
      ctx.fillText(`DAMAGE : ${Math.floor(state.damage)}%`, w - 260, 20 + titleSize * 2 + 18);

      if (state.gameOver) {
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `bold ${Math.max(28, w * 0.04)}px ${UI_FONT}`;
        ctx.fillStyle = "#ff4040";
        ctx.fillText("GAME OVER", w * 0.5, h * 0.42);

        ctx.font = `bold ${Math.max(16, w * 0.018)}px ${UI_FONT}`;
        ctx.fillStyle = UI_GREEN;
        ctx.fillText(`FINAL SCORE : ${state.score}`, w * 0.5, h * 0.48);
      }
    }

    function drawAimPoint() {
      ctx.strokeStyle = "rgba(0,255,120,0.35)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(state.pointerX, state.pointerY, 8, 0, Math.PI * 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(state.pointerX - 12, state.pointerY);
      ctx.lineTo(state.pointerX + 12, state.pointerY);
      ctx.moveTo(state.pointerX, state.pointerY - 12);
      ctx.lineTo(state.pointerX, state.pointerY + 12);
      ctx.stroke();
    }

    function render() {
      ctx.clearRect(0, 0, w, h);

      ctx.fillStyle = SKY_COLOR;
      ctx.fillRect(0, 0, w, h);

      drawStars();
      drawBuildings();
      drawGround();
      drawCIWS();
      drawBullets();
      drawMissiles();
      drawDrones();
      drawExplosions();
      drawAimPoint();
      drawUI();
    }

    function loop(ts) {
      const now = ts || performance.now();
      const dt = Math.min(0.033, (now - state.lastTime) / 1000 || 0);
      state.lastTime = now;

      update(dt, now);
      render();
      requestAnimationFrame(loop);
    }

    generateCity();
    generateStars();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
