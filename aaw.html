<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>CIWS City Defense v05</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      width: 100%;
      height: 100%;
      touch-action: none;
      font-family: "Courier New", monospace;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
      cursor: crosshair;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let w = window.innerWidth;
let h = window.innerHeight;
canvas.width = w;
canvas.height = h;

const UI_FONT = `"Courier New", monospace`;
const SKY_COLOR = "#000000";
const GROUND_COLOR = "#2f2f2f";
const UI_GREEN = "#00ff66";
const UI_RED = "#ff4040";
const UI_AMBER = "#ffb000";

const state = {
  score: 0,
  damage: 0,
  gameOver: false,
  pointerX: w * 0.5,
  pointerY: h * 0.35,
  firing: false,
  mouseDown: false,
  touchActive: false,
  lastShotAt: 0,
  lastTime: 0,
  missiles: [],
  drones: [],
  bullets: [],
  explosions: [],
  buildings: [],
  stars: [],
  spawnMissileTimer: 0,
  spawnDroneTimer: 0,
  audioReady: false
};

const groundY = () => h * 0.95;

const ciws = {
  get x() { return w * 0.5; },
  get y() { return groundY(); },
  get bodyW() { return Math.max(10, w * 0.012); },
  get bodyH() { return Math.max(30, h * 0.052); },
  turretAngle: -Math.PI / 2
};

function rand(min, max) {
  return Math.random() * (max - min) + min;
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function resize() {
  w = window.innerWidth;
  h = window.innerHeight;
  canvas.width = w;
  canvas.height = h;
  generateCity();
  generateStars();
}
window.addEventListener("resize", resize);

function generateStars() {
  state.stars = [];
  const count = Math.floor((w * h) / 12000);
  for (let i = 0; i < count; i++) {
    state.stars.push({
      x: rand(0, w),
      y: rand(0, h * 0.9),
      r: rand(0.5, 1.8),
      a: rand(0.3, 1.0)
    });
  }
}

function generateCity() {
  state.buildings = [];
  const count = 100;

  for (let i = 0; i < count; i++) {
    const bw = rand(w * 0.006, w * 0.025);
    const bh = rand(h * 0.02, h * 0.15);
    const bx = rand(0, w - bw);
    const by = groundY() - bh;

    const windows = [];
    const cols = Math.max(1, Math.floor(bw / 7));
    const rows = Math.max(1, Math.floor(bh / 10));

    for (let ry = 0; ry < rows; ry++) {
      for (let cx = 0; cx < cols; cx++) {
        const wx = bx + 2 + cx * (bw / cols);
        const wy = by + 3 + ry * (bh / rows);
        const ww = Math.max(1.5, bw / cols - 3);
        const wh = Math.max(2, bh / rows - 4);

        windows.push({
          x: wx,
          y: wy,
          w: ww,
          h: wh,
          lit: Math.random() < 0.45
        });
      }
    }

    const shade = Math.floor(rand(45, 100));
    state.buildings.push({
      x: bx,
      y: by,
      w: bw,
      h: bh,
      color: `rgb(${shade}, ${shade}, ${shade})`,
      windows
    });
  }

  state.buildings.sort((a, b) => (a.y + a.h) - (b.y + b.h));
}

function setPointer(x, y) {
  state.pointerX = clamp(x, 0, w);
  state.pointerY = clamp(y, 0, groundY() - 5);
}

function refreshFireState() {
  state.firing = !state.gameOver && (state.mouseDown || state.touchActive);
}

function stopAllFireInput() {
  state.mouseDown = false;
  state.touchActive = false;
  state.firing = false;
}

canvas.addEventListener("mousemove", (e) => {
  const rect = canvas.getBoundingClientRect();
  setPointer(e.clientX - rect.left, e.clientY - rect.top);
});

canvas.addEventListener("mousedown", async (e) => {
  await initAudio();
  const rect = canvas.getBoundingClientRect();
  setPointer(e.clientX - rect.left, e.clientY - rect.top);
  state.mouseDown = true;
  refreshFireState();
});

window.addEventListener("mouseup", () => {
  state.mouseDown = false;
  refreshFireState();
});

canvas.addEventListener("mouseleave", () => {
  state.mouseDown = false;
  refreshFireState();
});

canvas.addEventListener("touchstart", async (e) => {
  await initAudio();
  if (e.touches.length > 0) {
    const rect = canvas.getBoundingClientRect();
    setPointer(
      e.touches[0].clientX - rect.left,
      e.touches[0].clientY - rect.top
    );
    state.touchActive = true;
    refreshFireState();
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener("touchmove", (e) => {
  if (e.touches.length > 0) {
    const rect = canvas.getBoundingClientRect();
    setPointer(
      e.touches[0].clientX - rect.left,
      e.touches[0].clientY - rect.top
    );
    state.touchActive = true;
    refreshFireState();
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener("touchend", (e) => {
  state.touchActive = e.touches.length > 0;
  refreshFireState();
  e.preventDefault();
}, { passive: false });

canvas.addEventListener("touchcancel", (e) => {
  state.touchActive = false;
  refreshFireState();
  e.preventDefault();
}, { passive: false });

window.addEventListener("keydown", async (e) => {
  if (e.code === "Space") {
    await initAudio();
    state.mouseDown = true;
    refreshFireState();
    e.preventDefault();
  }
});

window.addEventListener("keyup", (e) => {
  if (e.code === "Space") {
    state.mouseDown = false;
    refreshFireState();
    e.preventDefault();
  }
});

function createBullet() {
  const sx = ciws.x;
  const sy = ciws.y - ciws.bodyH - 4;

  const dx = state.pointerX - sx;
  const dy = state.pointerY - sy;
  const len = Math.hypot(dx, dy) || 1;

  // 真上に撃つと画面上端まで約3秒
  const speed = h / 3;

  state.bullets.push({
    x: sx,
    y: sy,
    vx: (dx / len) * speed,
    vy: (dy / len) * speed,
    r: Math.max(0.8, w * 0.00065),
    life: 3.3
  });

  state.score -= 5;
}

function spawnMissile() {
  const startX = rand(w * 0.03, w * 0.97);
  const startY = -20;
  const targetX = rand(w * 0.02, w * 0.98);
  const targetY = groundY();

  const dx = targetX - startX;
  const dy = targetY - startY;
  const len = Math.hypot(dx, dy) || 1;
  const speed = rand(h * 0.17, h * 0.30);

  state.missiles.push({
    type: "missile",
    x: startX,
    y: startY,
    vx: (dx / len) * speed,
    vy: (dy / len) * speed,
    angle: Math.atan2(dy, dx),
    length: Math.max(14, w * 0.018),
    width: Math.max(3.2, w * 0.004)
  });
}

function spawnDrone() {
  const fromLeft = Math.random() < 0.5;
  const startX = fromLeft ? -20 : w + 20;
  const startY = rand(h * 0.45, h * 0.82);
  const targetX = rand(w * 0.02, w * 0.98);
  const targetY = groundY();

  const dx = targetX - startX;
  const dy = targetY - startY;
  const len = Math.hypot(dx, dy) || 1;
  const speed = rand(h * 0.08, h * 0.14);

  state.drones.push({
    type: "drone",
    x: startX,
    y: startY,
    vx: (dx / len) * speed,
    vy: (dy / len) * speed,
    angle: Math.atan2(dy, dx),
    size: Math.max(10, w * 0.015)
  });
}

function createExplosion(x, y, radius, colorA, colorB, isGroundHit = false) {
  state.explosions.push({
    x, y,
    t: 0,
    life: isGroundHit ? 0.62 : 0.45,
    radius,
    colorA,
    colorB,
    isGroundHit
  });

  playExplosionSound(radius, isGroundHit);
}

function hitTarget(target, bullet) {
  const tx = target.x;
  const ty = target.y;
  const r = target.type === "missile" ? target.length * 0.42 : target.size * 0.55;
  const d = Math.hypot(bullet.x - tx, bullet.y - ty);
  return d < r + bullet.r;
}

/* =========================
   AUDIO
========================= */
let audioCtx = null;
let masterGain = null;
let ciwsNoise = null;
let ciwsFilter = null;
let ciwsGain = null;
let ciwsLfo = null;
let ciwsLfoGain = null;

async function initAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.72;
      masterGain.connect(audioCtx.destination);

      ciwsNoise = createNoiseSource();
      ciwsFilter = audioCtx.createBiquadFilter();
      ciwsFilter.type = "bandpass";
      ciwsFilter.frequency.value = 150;
      ciwsFilter.Q.value = 1.1;

      ciwsGain = audioCtx.createGain();
      ciwsGain.gain.value = 0.0;

      // 発射音にわずかな脈動を入れて「ブゥーーー」感を強める
      ciwsLfo = audioCtx.createOscillator();
      ciwsLfo.type = "triangle";
      ciwsLfo.frequency.value = 34;

      ciwsLfoGain = audioCtx.createGain();
      ciwsLfoGain.gain.value = 18;

      ciwsLfo.connect(ciwsLfoGain);
      ciwsLfoGain.connect(ciwsFilter.frequency);

      ciwsNoise.connect(ciwsFilter);
      ciwsFilter.connect(ciwsGain);
      ciwsGain.connect(masterGain);

      ciwsNoise.start();
      ciwsLfo.start();
    } catch (err) {
      console.log("Audio init failed:", err);
      return;
    }
  }

  if (audioCtx.state === "suspended") {
    try {
      await audioCtx.resume();
    } catch (err) {
      console.log("Audio resume failed:", err);
    }
  }

  state.audioReady = (audioCtx && audioCtx.state === "running");
}

function createNoiseSource() {
  const bufferSize = audioCtx.sampleRate * 2;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = Math.random() * 2 - 1;
  }
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.loop = true;
  return source;
}

function updateCIWSSound() {
  if (!state.audioReady || !ciwsGain || !audioCtx) return;

  const now = audioCtx.currentTime;
  const targetGain = (state.firing && !state.gameOver) ? 0.30 : 0.0;

  ciwsGain.gain.cancelScheduledValues(now);
  ciwsGain.gain.linearRampToValueAtTime(targetGain, now + 0.02);
}

function playExplosionSound(radius, isGroundHit = false) {
  if (!state.audioReady || !audioCtx) return;

  const now = audioCtx.currentTime;

  const noise = createNoiseSource();
  const lowpass = audioCtx.createBiquadFilter();
  const bandpass = audioCtx.createBiquadFilter();
  const gain = audioCtx.createGain();

  lowpass.type = "lowpass";
  lowpass.frequency.value = isGroundHit ? 700 : 950;

  bandpass.type = "bandpass";
  bandpass.frequency.value = isGroundHit ? 120 : 180;
  bandpass.Q.value = 0.8;

  const base = Math.min(0.34, 0.11 + radius * 0.0028);
  const finalGain = isGroundHit ? base * 1.2 : base;

  gain.gain.setValueAtTime(finalGain, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + (isGroundHit ? 0.34 : 0.24));

  noise.connect(lowpass);
  lowpass.connect(bandpass);
  bandpass.connect(gain);
  gain.connect(masterGain);

  noise.start(now);
  noise.stop(now + (isGroundHit ? 0.36 : 0.26));
}

/* =========================
   UPDATE
========================= */
function update(dt, nowMs) {
  if (state.gameOver) {
    updateCIWSSound();
    return;
  }

  ciws.turretAngle = Math.atan2(
    state.pointerY - (ciws.y - ciws.bodyH - 4),
    state.pointerX - ciws.x
  );

  // 毎秒30発
  if (state.firing && nowMs - state.lastShotAt > (1000 / 30)) {
    createBullet();
    state.lastShotAt = nowMs;
  }

  updateCIWSSound();

  state.spawnMissileTimer -= dt;
  state.spawnDroneTimer -= dt;

  if (state.spawnMissileTimer <= 0) {
    spawnMissile();
    state.spawnMissileTimer = rand(0.6, 1.2);
  }

  if (state.spawnDroneTimer <= 0) {
    spawnDrone();
    state.spawnDroneTimer = rand(1.3, 2.2);
  }

  for (let i = state.bullets.length - 1; i >= 0; i--) {
    const b = state.bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;

    if (b.x < -20 || b.x > w + 20 || b.y < -20 || b.y > h + 20 || b.life <= 0) {
      state.bullets.splice(i, 1);
    }
  }

  for (let i = state.missiles.length - 1; i >= 0; i--) {
    const m = state.missiles[i];
    m.x += m.vx * dt;
    m.y += m.vy * dt;

    let destroyed = false;

    for (let j = state.bullets.length - 1; j >= 0; j--) {
      if (hitTarget(m, state.bullets[j])) {
        createExplosion(
          m.x, m.y,
          Math.max(18, w * 0.025),
          "#fff2a8", "#ff6a00",
          false
        );
        state.score += 200;
        state.missiles.splice(i, 1);
        state.bullets.splice(j, 1);
        destroyed = true;
        break;
      }
    }

    if (destroyed) continue;

    if (m.y >= groundY()) {
      createExplosion(
        m.x, groundY() - 6,
        Math.max(58, w * 0.085),
        "#fff7c8", "#ffb347",
        true
      );
      state.damage += 8;
      state.missiles.splice(i, 1);
    }
  }

  for (let i = state.drones.length - 1; i >= 0; i--) {
    const d = state.drones[i];
    d.x += d.vx * dt;
    d.y += d.vy * dt;

    let destroyed = false;

    for (let j = state.bullets.length - 1; j >= 0; j--) {
      if (hitTarget(d, state.bullets[j])) {
        createExplosion(
          d.x, d.y,
          Math.max(14, w * 0.02),
          "#f4f4f4", "#ff8844",
          false
        );
        state.score += 150;
        state.drones.splice(i, 1);
        state.bullets.splice(j, 1);
        destroyed = true;
        break;
      }
    }

    if (destroyed) continue;

    if (d.y >= groundY()) {
      createExplosion(
        d.x, groundY() - 6,
        Math.max(48, w * 0.072),
        "#fff8d6", "#ffbf66",
        true
      );
      state.damage += 5;
      state.drones.splice(i, 1);
    }
  }

  for (let i = state.explosions.length - 1; i >= 0; i--) {
    const ex = state.explosions[i];
    ex.t += dt;
    if (ex.t >= ex.life) {
      state.explosions.splice(i, 1);
    }
  }

  state.damage = clamp(state.damage, 0, 100);

  if (state.damage >= 100) {
    state.gameOver = true;
    stopAllFireInput();
    updateCIWSSound();
  }
}

/* =========================
   DRAW
========================= */
function drawStars() {
  for (const s of state.stars) {
    ctx.globalAlpha = s.a;
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawGround() {
  ctx.fillStyle = GROUND_COLOR;
  ctx.fillRect(0, groundY(), w, h - groundY());

  ctx.strokeStyle = "#555";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, groundY() + 0.5);
  ctx.lineTo(w, groundY() + 0.5);
  ctx.stroke();
}

function drawBuildings() {
  for (const b of state.buildings) {
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, b.y, b.w, b.h);

    for (const win of b.windows) {
      ctx.fillStyle = win.lit ? (Math.random() < 0.03 ? "#ffd080" : "#f7f1a1") : "#111111";
      ctx.fillRect(win.x, win.y, win.w, win.h);
    }
  }
}

function drawCIWS() {
  const baseX = ciws.x;
  const baseY = ciws.y;

  ctx.fillStyle = "#bebebe";
  ctx.fillRect(
    baseX - ciws.bodyW / 2,
    baseY - ciws.bodyH,
    ciws.bodyW,
    ciws.bodyH
  );

  const domeR = ciws.bodyW * 0.48;

  ctx.beginPath();
  ctx.fillStyle = "#d8d8d8";
  ctx.arc(baseX, baseY - ciws.bodyH, domeR, Math.PI, 0);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "#cfcfcf";
  ctx.fillRect(baseX - domeR * 0.92, baseY - ciws.bodyH, domeR * 1.84, 4);

  ctx.save();
  ctx.translate(baseX, baseY - ciws.bodyH + 2);
  ctx.rotate(ciws.turretAngle);
  ctx.fillStyle = "#eeeeee";
  ctx.fillRect(0, -1.5, Math.max(16, w * 0.025), 3);
  ctx.restore();
}

function drawBullets() {
  for (const b of state.bullets) {
    const glow = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r * 4.0);
    glow.addColorStop(0, "rgba(255,255,255,1)");
    glow.addColorStop(0.16, "rgba(255,245,250,1)");
    glow.addColorStop(0.45, "rgba(255,185,225,0.9)");
    glow.addColorStop(0.75, "rgba(255,70,170,0.45)");
    glow.addColorStop(1, "rgba(255,0,120,0)");

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r * 4.0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#fff9fc";
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawMissiles() {
  for (const m of state.missiles) {
    ctx.save();
    ctx.translate(m.x, m.y);
    ctx.rotate(m.angle);

    ctx.fillStyle = "#808080";
    ctx.beginPath();
    ctx.moveTo(m.length * 0.5, 0);
    ctx.lineTo(m.length * 0.15, -m.width * 0.6);
    ctx.lineTo(-m.length * 0.5, -m.width * 0.6);
    ctx.lineTo(-m.length * 0.5, m.width * 0.6);
    ctx.lineTo(m.length * 0.15, m.width * 0.6);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }
}

function drawDrones() {
  for (const d of state.drones) {
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate(d.angle);

    ctx.fillStyle = "#646464";
    ctx.beginPath();
    ctx.moveTo(d.size * 0.75, 0);
    ctx.lineTo(-d.size * 0.55, -d.size * 0.42);
    ctx.lineTo(-d.size * 0.20, 0);
    ctx.lineTo(-d.size * 0.55, d.size * 0.42);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#5a5a5a";
    ctx.fillRect(-d.size * 0.58, -d.size * 0.06, d.size * 0.16, d.size * 0.12);

    ctx.restore();
  }
}

function drawExplosions() {
  for (const ex of state.explosions) {
    const p = ex.t / ex.life;
    const growth = ex.isGroundHit ? 1.5 : 1.2;
    const r = ex.radius * (0.3 + p * growth);

    const grad = ctx.createRadialGradient(ex.x, ex.y, 0, ex.x, ex.y, r);
    if (ex.isGroundHit) {
      grad.addColorStop(0, "rgba(255,255,240,1)");
      grad.addColorStop(0.2, ex.colorA);
      grad.addColorStop(0.45, ex.colorB);
      grad.addColorStop(0.75, "rgba(255,120,0,0.45)");
      grad.addColorStop(1, "rgba(255,80,0,0)");
    } else {
      grad.addColorStop(0, ex.colorA);
      grad.addColorStop(0.35, ex.colorB);
      grad.addColorStop(1, "rgba(255,80,0,0)");
    }

    ctx.globalAlpha = 1 - p;
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, r, 0, Math.PI * 2);
    ctx.fill();

    if (ex.isGroundHit) {
      ctx.fillStyle = `rgba(255, 235, 180, ${0.25 * (1 - p)})`;
      ctx.fillRect(ex.x - r * 0.9, groundY() - 4, r * 1.8, Math.max(6, r * 0.12));
    }

    ctx.globalAlpha = 1;
  }
}

function drawUI() {
  ctx.textAlign = "left";
  ctx.textBaseline = "top";

  const titleSize = Math.max(16, w * 0.018);
  const subSize = Math.max(14, w * 0.015);
  const uiX = w - 280;

  ctx.font = `bold ${titleSize}px ${UI_FONT}`;
  ctx.fillStyle = UI_GREEN;
  ctx.fillText("FIRE : TOUCH / MOUSE", uiX, 20);

  ctx.fillStyle = UI_AMBER;
  ctx.fillText(`SCORE : ${state.score}`, uiX, 20 + titleSize + 8);

  ctx.font = `bold ${subSize}px ${UI_FONT}`;
  ctx.fillStyle = UI_RED;
  ctx.fillText(`DAMAGE : ${Math.floor(state.damage)}%`, uiX, 20 + titleSize * 2 + 18);

  if (!state.audioReady) {
    ctx.font = `bold ${subSize}px ${UI_FONT}`;
    ctx.fillStyle = "#88aaff";
    ctx.fillText("TAP / CLICK TO ENABLE SOUND", uiX, 20 + titleSize * 2 + subSize + 30);
  }

  if (state.gameOver) {
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = `bold ${Math.max(28, w * 0.04)}px ${UI_FONT}`;
    ctx.fillStyle = "#ff4040";
    ctx.fillText("GAME OVER", w * 0.5, h * 0.42);

    ctx.font = `bold ${Math.max(16, w * 0.018)}px ${UI_FONT}`;
    ctx.fillStyle = UI_AMBER;
    ctx.fillText(`FINAL SCORE : ${state.score}`, w * 0.5, h * 0.48);
  }
}

function drawAimPoint() {
  ctx.strokeStyle = "rgba(0,255,120,0.35)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(state.pointerX, state.pointerY, 8, 0, Math.PI * 2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(state.pointerX - 12, state.pointerY);
  ctx.lineTo(state.pointerX + 12, state.pointerY);
  ctx.moveTo(state.pointerX, state.pointerY - 12);
  ctx.lineTo(state.pointerX, state.pointerY + 12);
  ctx.stroke();
}

function render() {
  ctx.clearRect(0, 0, w, h);

  ctx.fillStyle = SKY_COLOR;
  ctx.fillRect(0, 0, w, h);

  drawStars();
  drawBuildings();
  drawGround();
  drawCIWS();
  drawBullets();
  drawMissiles();
  drawDrones();
  drawExplosions();
  drawAimPoint();
  drawUI();
}

function loop(ts) {
  const now = ts || performance.now();
  const dt = Math.min(0.033, (now - state.lastTime) / 1000 || 0);
  state.lastTime = now;

  update(dt, now);
  render();
  requestAnimationFrame(loop);
}

generateCity();
generateStars();
requestAnimationFrame(loop);
</script>
</body>
</html>
