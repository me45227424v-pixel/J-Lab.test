<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nixie Clock Test</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: "Courier New", monospace;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .clock-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .label {
      color: rgba(255, 170, 70, 0.45);
      font-size: 14px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(255, 140, 40, 0.25);
    }

    .clock {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 28px 34px;
      border: 2px solid rgba(255, 140, 40, 0.18);
      border-radius: 18px;
      background:
        radial-gradient(circle at center, rgba(255, 120, 20, 0.05), rgba(0,0,0,0) 65%),
        linear-gradient(to bottom, rgba(255,255,255,0.03), rgba(255,255,255,0));
      box-shadow:
        inset 0 0 30px rgba(255, 120, 20, 0.08),
        0 0 24px rgba(255, 120, 20, 0.08);
    }

    .digit-group {
      display: flex;
      gap: 8px;
    }

    .digit, .colon {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ff9b2f;
      user-select: none;
      -webkit-user-select: none;
    }

    .digit {
      width: 0.9em;
      font-size: clamp(54px, 12vw, 132px);
      font-weight: 400;
      line-height: 1;
      text-shadow:
        0 0 4px rgba(255, 160, 60, 0.85),
        0 0 10px rgba(255, 140, 40, 0.75),
        0 0 22px rgba(255, 110, 20, 0.55),
        0 0 42px rgba(255, 90, 10, 0.35);
      filter: saturate(1.1);
    }

    .digit::before {
      content: "";
      position: absolute;
      inset: -0.16em -0.08em;
      border-radius: 18px;
      border: 1px solid rgba(255, 140, 40, 0.14);
      box-shadow:
        inset 0 0 14px rgba(255, 130, 30, 0.08),
        0 0 8px rgba(255, 130, 30, 0.06);
      pointer-events: none;
    }

    .digit::after {
      content: "";
      position: absolute;
      width: 0.08em;
      height: 1.2em;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.10),
        rgba(255,160,60,0.20),
        rgba(255,255,255,0.06)
      );
      opacity: 0.22;
      filter: blur(0.4px);
      pointer-events: none;
    }

    .colon {
      font-size: clamp(44px, 9vw, 96px);
      margin: 0 2px;
      transform: translateY(-0.02em);
      text-shadow:
        0 0 4px rgba(255, 160, 60, 0.75),
        0 0 10px rgba(255, 140, 40, 0.65),
        0 0 22px rgba(255, 110, 20, 0.45);
    }

    .hint {
      color: rgba(255, 170, 70, 0.6);
      font-size: 14px;
      letter-spacing: 0.08em;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="clock-wrap">
    <div class="label">NIXIE CLOCK TEST</div>
    <div class="clock" id="clock" aria-label="digital clock">
      <div class="digit-group">
        <div class="digit" id="h1">0</div>
        <div class="digit" id="h2">0</div>
      </div>
      <div class="colon">:</div>
      <div class="digit-group">
        <div class="digit" id="m1">0</div>
        <div class="digit" id="m2">0</div>
      </div>
      <div class="colon">:</div>
      <div class="digit-group">
        <div class="digit" id="s1">0</div>
        <div class="digit" id="s2">0</div>
      </div>
    </div>
    <div class="hint">秒が変われば JavaScript は動いている</div>
  </div>

  <script>
    function pad2(num) {
      return String(num).padStart(2, "0");
    }

    function updateClock() {
      const now = new Date();
      const hh = pad2(now.getHours());
      const mm = pad2(now.getMinutes());
      const ss = pad2(now.getSeconds());

      document.getElementById("h1").textContent = hh[0];
      document.getElementById("h2").textContent = hh[1];
      document.getElementById("m1").textContent = mm[0];
      document.getElementById("m2").textContent = mm[1];
      document.getElementById("s1").textContent = ss[0];
      document.getElementById("s2").textContent = ss[1];
    }

    updateClock();
    setInterval(updateClock, 200);
  </script>
</body>
</html>
